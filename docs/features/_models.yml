AdminClass:
  fields:
    id: Int @id @default(autoincrement())
    jwId: Int? @unique
    code: String?
    grade: String?
    nameCn: String @unique
    nameEn: String?
    stdCount: Int?
    planCount: Int?
    enabled: Boolean?
    abbrZh: String?
    abbrEn: String?
    sections: Section[] @relation("SectionAdminClasses")
  constraints:
    - "@@index([jwId])"
    - "@@index([code])"
    - "@@index([nameCn])"
Building:
  fields:
    id: Int @id @default(autoincrement())
    jwId: Int @unique
    nameCn: String
    nameEn: String?
    code: String
    campusId: Int?
    campus: "Campus? @relation(fields: [campusId], references: [id])"
    rooms: Room[]
  constraints:
    - "@@index([jwId])"
    - "@@index([nameCn])"
    - "@@index([nameEn])"
    - "@@index([campusId])"
Campus:
  fields:
    id: Int @id @default(autoincrement())
    jwId: Int? @unique
    nameCn: String @unique
    nameEn: String?
    code: String?
    buildings: Building[]
    sections: Section[]
  constraints:
    - "@@index([jwId])"
    - "@@index([code])"
    - "@@index([nameCn])"
    - "@@index([nameEn])"
ClassType:
  fields:
    id: Int @id @default(autoincrement())
    nameCn: String @unique
    nameEn: String?
    courses: Course[]
  constraints:
    - "@@index([nameCn])"
    - "@@index([nameEn])"
Course:
  fields:
    id: Int @id @default(autoincrement())
    jwId: Int @unique
    code: String
    nameCn: String
    nameEn: String?
    categoryId: Int?
    classTypeId: Int?
    classifyId: Int?
    educationLevelId: Int?
    gradationId: Int?
    typeId: Int?
    category: "CourseCategory? @relation(fields: [categoryId], references: [id])"
    classType: "ClassType? @relation(fields: [classTypeId], references: [id])"
    classify: "CourseClassify? @relation(fields: [classifyId], references: [id])"
    educationLevel: "EducationLevel? @relation(fields: [educationLevelId], references: [id])"
    gradation: "CourseGradation? @relation(fields: [gradationId], references: [id])"
    type: "CourseType? @relation(fields: [typeId], references: [id])"
    sections: Section[]
    comments: Comment[]
    description: Description?
  constraints:
    - "@@index([jwId])"
    - "@@index([code])"
    - "@@index([nameCn])"
    - "@@index([nameEn])"
    - "@@index([categoryId])"
    - "@@index([classTypeId])"
    - "@@index([classifyId])"
    - "@@index([educationLevelId])"
    - "@@index([gradationId])"
    - "@@index([typeId])"
CourseCategory:
  fields:
    id: Int @id @default(autoincrement())
    nameCn: String @unique
    nameEn: String?
    courses: Course[]
  constraints:
    - "@@index([nameCn])"
    - "@@index([nameEn])"
CourseClassify:
  fields:
    id: Int @id @default(autoincrement())
    nameCn: String @unique
    nameEn: String?
    courses: Course[]
  constraints:
    - "@@index([nameCn])"
    - "@@index([nameEn])"
CourseGradation:
  fields:
    id: Int @id @default(autoincrement())
    nameCn: String @unique
    nameEn: String?
    courses: Course[]
  constraints:
    - "@@index([nameCn])"
    - "@@index([nameEn])"
CourseType:
  fields:
    id: Int @id @default(autoincrement())
    nameCn: String @unique
    nameEn: String?
    courses: Course[]
  constraints:
    - "@@index([nameCn])"
    - "@@index([nameEn])"
Department:
  fields:
    id: Int @id @default(autoincrement())
    code: String @unique
    nameCn: String
    nameEn: String?
    isCollege: Boolean?
    sections: Section[]
    teachers: Teacher[]
  constraints:
    - "@@index([code])"
    - "@@index([nameCn])"
    - "@@index([nameEn])"
EducationLevel:
  fields:
    id: Int @id @default(autoincrement())
    nameCn: String @unique
    nameEn: String?
    courses: Course[]
  constraints:
    - "@@index([nameCn])"
    - "@@index([nameEn])"
ExamMode:
  fields:
    id: Int @id @default(autoincrement())
    nameCn: String @unique
    nameEn: String?
    sections: Section[]
  constraints:
    - "@@index([nameCn])"
    - "@@index([nameEn])"
Room:
  fields:
    id: Int @id @default(autoincrement())
    jwId: Int @unique
    nameCn: String
    nameEn: String?
    code: String
    floor: Int?
    virtual: Boolean
    seatsForSection: Int
    remark: String?
    seats: Int
    buildingId: Int?
    roomTypeId: Int?
    building: "Building? @relation(fields: [buildingId], references: [id])"
    roomType: "RoomType? @relation(fields: [roomTypeId], references: [id])"
    schedules: Schedule[]
  constraints:
    - "@@unique([buildingId, code])"
    - "@@index([jwId])"
    - "@@index([nameCn])"
    - "@@index([nameEn])"
RoomType:
  fields:
    id: Int @id @default(autoincrement())
    jwId: Int @unique
    nameCn: String
    nameEn: String?
    code: String
    rooms: Room[]
    sections: Section[]
  constraints:
    - "@@index([jwId])"
    - "@@index([nameCn])"
    - "@@index([nameEn])"
Schedule:
  fields:
    id: Int @id @default(autoincrement())
    periods: Int
    date: DateTime? @db.Date
    weekday: Int
    startTime: Int
    endTime: Int
    experiment: String?
    customPlace: String?
    lessonType: String?
    weekIndex: Int
    exerciseClass: Boolean?
    startUnit: Int
    endUnit: Int
    roomId: Int?
    sectionId: Int
    scheduleGroupId: Int
    room: "Room? @relation(fields: [roomId], references: [id])"
    section: "Section @relation(fields: [sectionId], references: [id])"
    scheduleGroup: "ScheduleGroup @relation(fields: [scheduleGroupId], references: [id])"
    teachers: Teacher[] @relation("ScheduleTeachers")
  constraints:
    - "@@index([date])"
    - "@@index([roomId])"
    - "@@index([sectionId])"
    - "@@index([scheduleGroupId])"
ScheduleGroup:
  fields:
    id: Int @id @default(autoincrement())
    jwId: Int @unique
    no: Int
    limitCount: Int
    stdCount: Int
    actualPeriods: Int
    isDefault: Boolean
    sectionId: Int
    section: "Section @relation(fields: [sectionId], references: [id])"
    schedules: Schedule[]
  constraints:
    - "@@index([jwId])"
    - "@@index([sectionId])"
Section:
  fields:
    id: Int @id @default(autoincrement())
    jwId: Int @unique
    code: String
    bizTypeId: Int?
    credits: Float?
    period: Int?
    periodsPerWeek: Int?
    timesPerWeek: Int?
    stdCount: Int?
    limitCount: Int?
    graduateAndPostgraduate: Boolean?
    dateTimePlaceText: String?
    dateTimePlacePersonText: Json?
    actualPeriods: Int?
    theoryPeriods: Float?
    practicePeriods: Float?
    experimentPeriods: Float?
    machinePeriods: Float?
    designPeriods: Float?
    testPeriods: Float?
    scheduleState: String?
    suggestScheduleWeeks: Json?
    suggestScheduleWeekInfo: String?
    scheduleJsonParams: Json?
    selectedStdCount: Int?
    remark: String?
    scheduleRemark: String?
    courseId: Int
    semesterId: Int?
    campusId: Int?
    examModeId: Int?
    openDepartmentId: Int?
    teachLanguageId: Int?
    roomTypeId: Int?
    course: "Course @relation(fields: [courseId], references: [id])"
    semester: "Semester? @relation(fields: [semesterId], references: [id])"
    campus: "Campus? @relation(fields: [campusId], references: [id])"
    examMode: "ExamMode? @relation(fields: [examModeId], references: [id])"
    openDepartment: "Department? @relation(fields: [openDepartmentId], references: [id])"
    teachLanguage: "TeachLanguage? @relation(fields: [teachLanguageId], references: [id])"
    roomType: "RoomType? @relation(fields: [roomTypeId], references: [id])"
    schedules: Schedule[]
    scheduleGroups: ScheduleGroup[]
    adminClasses: AdminClass[] @relation("SectionAdminClasses")
    teachers: Teacher[] @relation("SectionTeachers")
    sectionTeachers: SectionTeacher[]
    teacherAssignments: TeacherAssignment[]
    exams: Exam[]
    subscribedUsers: User[] @relation("UserCalendarSections")
    comments: Comment[]
    description: Description?
    homeworks: Homework[]
    homeworkAuditLogs: HomeworkAuditLog[]
  constraints:
    - "@@index([jwId])"
    - "@@index([code])"
    - "@@index([bizTypeId])"
    - "@@index([period])"
    - "@@index([graduateAndPostgraduate])"
    - "@@index([courseId])"
    - "@@index([semesterId])"
    - "@@index([examModeId])"
    - "@@index([campusId])"
    - "@@index([openDepartmentId])"
    - "@@index([roomTypeId])"
    - "@@index([teachLanguageId])"
Exam:
  fields:
    id: Int @id @default(autoincrement())
    jwId: Int @unique
    examType: Int?
    startTime: Int?
    endTime: Int?
    examDate: DateTime? @db.Date
    examTakeCount: Int?
    examMode: String?
    examBatchId: Int?
    sectionId: Int
    examBatch: "ExamBatch? @relation(fields: [examBatchId], references: [id], onDelete: Cascade)"
    section: "Section @relation(fields: [sectionId], references: [id], onDelete: Cascade)"
    examRooms: ExamRoom[]
  constraints:
    - "@@index([jwId])"
    - "@@index([examType])"
    - "@@index([examDate])"
    - "@@index([examBatchId])"
    - "@@index([sectionId])"
ExamBatch:
  fields:
    id: Int @id @default(autoincrement())
    nameCn: String @unique
    nameEn: String?
    exams: Exam[]
  constraints:
    - "@@index([nameCn])"
ExamRoom:
  fields:
    id: Int @id @default(autoincrement())
    room: String
    count: Int
    examId: Int
    exam: "Exam @relation(fields: [examId], references: [id], onDelete: Cascade)"
  constraints:
    - "@@index([examId])"
    - "@@index([room])"
Semester:
  fields:
    id: Int @id @default(autoincrement())
    jwId: Int @unique
    nameCn: String
    code: String
    startDate: DateTime? @db.Date
    endDate: DateTime? @db.Date
    sections: Section[]
  constraints:
    - "@@index([jwId])"
Teacher:
  fields:
    id: Int @id @default(autoincrement())
    personId: Int? @unique
    teacherId: Int? @unique
    code: String? @unique
    nameCn: String
    nameEn: String?
    age: Int?
    email: String?
    telephone: String?
    mobile: String?
    address: String?
    postcode: String?
    qq: String?
    wechat: String?
    departmentId: Int?
    teacherTitleId: Int?
    department: "Department? @relation(fields: [departmentId], references: [id])"
    teacherTitle: "TeacherTitle? @relation(fields: [teacherTitleId], references: [id])"
    sections: Section[] @relation("SectionTeachers")
    sectionTeachers: SectionTeacher[]
    teacherAssignments: TeacherAssignment[]
    schedules: Schedule[] @relation("ScheduleTeachers")
    comments: Comment[]
    description: Description?
  constraints:
    - "@@unique([nameCn, departmentId])"
    - "@@index([code])"
    - "@@index([nameCn])"
    - "@@index([nameEn])"
    - "@@index([teacherTitleId])"
    - "@@index([departmentId])"
Description:
  fields:
    id: String @id @default(cuid())
    content: String @default("")
    createdAt: DateTime @default(now())
    updatedAt: DateTime @updatedAt
    lastEditedAt: DateTime?
    lastEditedById: String?
    lastEditedBy: 'User? @relation("DescriptionLastEditor", fields: [lastEditedById], references: [id], onDelete: SetNull)'
    sectionId: Int? @unique
    courseId: Int? @unique
    teacherId: Int? @unique
    homeworkId: String? @unique
    section: "Section? @relation(fields: [sectionId], references: [id], onDelete: Cascade)"
    course: "Course? @relation(fields: [courseId], references: [id], onDelete: Cascade)"
    teacher: "Teacher? @relation(fields: [teacherId], references: [id], onDelete: Cascade)"
    homework: "Homework? @relation(fields: [homeworkId], references: [id], onDelete: Cascade)"
    edits: DescriptionEdit[]
  constraints:
    - "@@index([lastEditedById])"
    - "@@index([homeworkId])"
Homework:
  fields:
    id: String @id @default(cuid())
    title: String
    isMajor: Boolean @default(false)
    requiresTeam: Boolean @default(false)
    publishedAt: DateTime?
    submissionStartAt: DateTime?
    submissionDueAt: DateTime?
    createdAt: DateTime @default(now())
    updatedAt: DateTime @updatedAt
    deletedAt: DateTime?
    sectionId: Int
    section: "Section @relation(fields: [sectionId], references: [id], onDelete: Cascade)"
    createdById: String?
    createdBy: 'User? @relation("HomeworkCreatedBy", fields: [createdById], references: [id], onDelete: SetNull)'
    updatedById: String?
    updatedBy: 'User? @relation("HomeworkUpdatedBy", fields: [updatedById], references: [id], onDelete: SetNull)'
    deletedById: String?
    deletedBy: 'User? @relation("HomeworkDeletedBy", fields: [deletedById], references: [id], onDelete: SetNull)'
    description: Description?
    comments: Comment[]
    auditLogs: HomeworkAuditLog[]
    homeworkCompletions: HomeworkCompletion[]
  constraints:
    - "@@index([sectionId])"
    - "@@index([publishedAt])"
    - "@@index([submissionDueAt])"
    - "@@index([deletedAt])"
    - "@@index([createdById])"
    - "@@index([sectionId, deletedAt])"
    - "@@index([sectionId, submissionDueAt])"
HomeworkCompletion:
  fields:
    userId: String
    homeworkId: String
    completedAt: DateTime @default(now())
    user: "User @relation(fields: [userId], references: [id], onDelete: Cascade)"
    homework: "Homework @relation(fields: [homeworkId], references: [id], onDelete: Cascade)"
  constraints:
    - "@@id([userId, homeworkId])"
    - "@@index([homeworkId])"
    - "@@index([userId])"
HomeworkAuditLog:
  fields:
    id: String @id @default(cuid())
    action: HomeworkAuditAction
    titleSnapshot: String
    createdAt: DateTime @default(now())
    sectionId: Int
    section: "Section @relation(fields: [sectionId], references: [id], onDelete: Cascade)"
    homeworkId: String?
    homework: "Homework? @relation(fields: [homeworkId], references: [id], onDelete: SetNull)"
    actorId: String?
    actor: 'User? @relation("HomeworkAuditActor", fields: [actorId], references: [id], onDelete: SetNull)'
  constraints:
    - "@@index([sectionId])"
    - "@@index([homeworkId])"
    - "@@index([actorId])"
    - "@@index([createdAt])"
    - "@@index([sectionId, createdAt])"
AuditLog:
  fields:
    id: String @id @default(cuid())
    action: AuditAction
    userId: String
    user: "User @relation(fields: [userId], references: [id])"
    targetId: String?
    targetType: String?
    metadata: Json?
    createdAt: DateTime @default(now())
    ipAddress: String?
    userAgent: String?
  constraints:
    - "@@index([userId])"
    - "@@index([action])"
    - "@@index([createdAt])"
DescriptionEdit:
  fields:
    id: String @id @default(cuid())
    descriptionId: String
    description: "Description @relation(fields: [descriptionId], references: [id], onDelete: Cascade)"
    editorId: String?
    editor: 'User? @relation("DescriptionEdits", fields: [editorId], references: [id], onDelete: SetNull)'
    previousContent: String?
    nextContent: String
    createdAt: DateTime @default(now())
  constraints:
    - "@@index([descriptionId])"
    - "@@index([editorId])"
    - "@@index([createdAt])"
    - "@@index([descriptionId, createdAt])"
SectionTeacher:
  fields:
    id: Int @id @default(autoincrement())
    sectionId: Int
    teacherId: Int
    section: "Section @relation(fields: [sectionId], references: [id], onDelete: Cascade)"
    teacher: "Teacher @relation(fields: [teacherId], references: [id], onDelete: Cascade)"
    comments: Comment[]
    createdAt: DateTime @default(now())
    updatedAt: DateTime @updatedAt
  constraints:
    - "@@unique([sectionId, teacherId])"
    - "@@index([sectionId])"
    - "@@index([teacherId])"
TeachLanguage:
  fields:
    id: Int @id @default(autoincrement())
    nameCn: String @unique
    nameEn: String?
    sections: Section[]
  constraints:
    - "@@index([nameCn])"
    - "@@index([nameEn])"
TeacherTitle:
  fields:
    id: Int @id @default(autoincrement())
    jwId: Int @unique
    nameCn: String @unique
    nameEn: String?
    code: String
    enabled: Boolean?
    teachers: Teacher[]
  constraints:
    - "@@index([jwId])"
    - "@@index([nameCn])"
TeacherLessonType:
  fields:
    id: Int @id @default(autoincrement())
    jwId: Int @unique
    nameCn: String
    nameEn: String?
    code: String
    role: String?
    enabled: Boolean?
    teacherAssignments: TeacherAssignment[]
  constraints:
    - "@@index([jwId])"
    - "@@index([nameCn])"
TeacherAssignment:
  fields:
    id: Int @id @default(autoincrement())
    teacherId: Int
    sectionId: Int
    role: String?
    period: Int?
    weekIndices: Json?
    weekIndicesMsg: String?
    teacherLessonTypeId: Int?
    teacher: "Teacher @relation(fields: [teacherId], references: [id])"
    section: "Section @relation(fields: [sectionId], references: [id])"
    teacherLessonType: "TeacherLessonType? @relation(fields: [teacherLessonTypeId], references: [id])"
  constraints:
    - "@@unique([teacherId, sectionId])"
    - "@@index([teacherId])"
    - "@@index([sectionId])"
    - "@@index([teacherLessonTypeId])"
User:
  fields:
    id: String @id @default(cuid())
    email: String @unique
    emailVerified: Boolean @default(false)
    name: String @default("")
    username: String? @unique
    image: String?
    profilePictures: String[] @default([])
    isAdmin: Boolean @default(false)
    calendarFeedToken: String? @unique
    accounts: Account[]
    sessions: Session[]
    Authenticator: Authenticator[]
    verifiedEmails: VerifiedEmail[]
    createdAt: DateTime @default(now())
    updatedAt: DateTime @updatedAt
    subscribedSections: Section[] @relation("UserCalendarSections")
    uploads: Upload[]
    uploadPendings: UploadPending[]
    comments: Comment[]
    moderatedComments: Comment[] @relation("ModeratedComments")
    commentReactions: CommentReaction[]
    suspensions: UserSuspension[] @relation("SuspendedUser")
    suspensionsIssued: UserSuspension[] @relation("SuspensionCreatedBy")
    suspensionsLifted: UserSuspension[] @relation("SuspensionLiftedBy")
    descriptionEdits: DescriptionEdit[] @relation("DescriptionEdits")
    descriptionLastEdits: Description[] @relation("DescriptionLastEditor")
    homeworksCreated: Homework[] @relation("HomeworkCreatedBy")
    homeworksUpdated: Homework[] @relation("HomeworkUpdatedBy")
    homeworksDeleted: Homework[] @relation("HomeworkDeletedBy")
    homeworkAuditLogs: HomeworkAuditLog[] @relation("HomeworkAuditActor")
    auditLogs: AuditLog[]
    homeworkCompletions: HomeworkCompletion[]
    dashboardLinkClicks: DashboardLinkClick[]
    dashboardLinkPins: DashboardLinkPin[]
    todos: Todo[]
    busPreference: BusUserPreference?
    oauthClients: OAuthClient[]
    oauthAccessTokens: OAuthAccessToken[]
    oauthRefreshTokens: OAuthRefreshToken[]
    oauthConsents: OAuthConsent[]
    deviceCodes: DeviceCode[]
DashboardLinkClick:
  fields:
    id: String @id @default(cuid())
    userId: String
    slug: String
    count: Int @default(0)
    lastClickedAt: DateTime @default(now())
    createdAt: DateTime @default(now())
    updatedAt: DateTime @updatedAt
    user: "User @relation(fields: [userId], references: [id], onDelete: Cascade)"
  constraints:
    - "@@unique([userId, slug])"
    - "@@index([userId])"
    - "@@index([slug])"
DashboardLinkPin:
  fields:
    id: String @id @default(cuid())
    userId: String
    slug: String
    createdAt: DateTime @default(now())
    updatedAt: DateTime @updatedAt
    user: "User @relation(fields: [userId], references: [id], onDelete: Cascade)"
  constraints:
    - "@@unique([userId, slug])"
    - "@@index([userId])"
    - "@@index([slug])"
Upload:
  fields:
    id: String @id @default(cuid())
    key: String @unique
    filename: String
    contentType: String?
    size: Int
    createdAt: DateTime @default(now())
    updatedAt: DateTime @updatedAt
    userId: String
    user: "User @relation(fields: [userId], references: [id], onDelete: Cascade)"
    commentAttachments: CommentAttachment[]
  constraints:
    - "@@index([userId])"
    - "@@index([userId, createdAt])"
Comment:
  fields:
    id: String @id @default(cuid())
    body: String
    visibility: CommentVisibility @default(public)
    status: CommentStatus @default(active)
    isAnonymous: Boolean @default(false)
    authorName: String?
    createdAt: DateTime @default(now())
    updatedAt: DateTime @updatedAt
    deletedAt: DateTime?
    moderatedAt: DateTime?
    moderationNote: String?
    userId: String?
    user: "User? @relation(fields: [userId], references: [id], onDelete: SetNull)"
    moderatedById: String?
    moderatedBy: 'User? @relation("ModeratedComments", fields: [moderatedById], references: [id], onDelete: SetNull)'
    parentId: String?
    parent: 'Comment? @relation("CommentReplies", fields: [parentId], references: [id], onDelete: Cascade)'
    replies: Comment[] @relation("CommentReplies")
    rootId: String?
    root: 'Comment? @relation("CommentRoot", fields: [rootId], references: [id], onDelete: Cascade)'
    thread: Comment[] @relation("CommentRoot")
    sectionId: Int?
    courseId: Int?
    teacherId: Int?
    sectionTeacherId: Int?
    homeworkId: String?
    section: "Section? @relation(fields: [sectionId], references: [id], onDelete: Cascade)"
    course: "Course? @relation(fields: [courseId], references: [id], onDelete: Cascade)"
    teacher: "Teacher? @relation(fields: [teacherId], references: [id], onDelete: Cascade)"
    sectionTeacher: "SectionTeacher? @relation(fields: [sectionTeacherId], references: [id], onDelete: Cascade)"
    homework: "Homework? @relation(fields: [homeworkId], references: [id], onDelete: Cascade)"
    attachments: CommentAttachment[]
    reactions: CommentReaction[]
  constraints:
    - "@@index([userId])"
    - "@@index([parentId])"
    - "@@index([rootId])"
    - "@@index([sectionId])"
    - "@@index([courseId])"
    - "@@index([teacherId])"
    - "@@index([sectionTeacherId])"
    - "@@index([homeworkId])"
    - "@@index([status])"
    - "@@index([visibility])"
    - "@@index([userId, status])"
    - "@@index([sectionId, status])"
    - "@@index([courseId, status])"
    - "@@index([teacherId, status])"
    - "@@index([status, createdAt])"
    - "@@index([rootId, createdAt])"
CommentAttachment:
  fields:
    id: String @id @default(cuid())
    commentId: String
    uploadId: String
    createdAt: DateTime @default(now())
    comment: "Comment @relation(fields: [commentId], references: [id], onDelete: Cascade)"
    upload: "Upload @relation(fields: [uploadId], references: [id], onDelete: Cascade)"
  constraints:
    - "@@unique([commentId, uploadId])"
    - "@@index([uploadId])"
CommentReaction:
  fields:
    id: String @id @default(cuid())
    type: CommentReactionType
    createdAt: DateTime @default(now())
    commentId: String
    userId: String
    comment: "Comment @relation(fields: [commentId], references: [id], onDelete: Cascade)"
    user: "User @relation(fields: [userId], references: [id], onDelete: Cascade)"
  constraints:
    - "@@unique([commentId, userId, type])"
    - "@@index([userId])"
    - "@@index([commentId])"
