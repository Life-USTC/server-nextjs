name: Life@USTC
language: en
file: docs/features
query: sh
queries:
  list_modules: find docs/features -maxdepth 1 -type f -name '*.yml' ! -name '_*.yml' -exec basename {} .yml \; | sort
  list_models: yq 'keys' docs/features/_models.yml
  list_enums: yq 'keys' docs/features/_enums.yml
  list_mcp_tools_stable: for f in docs/features/*.yml; do case "$(basename "$f")" in _*) continue;; esac; yq '.capabilities[].mcp | select(type == "!!map") | .tools[]? | select((.status // "stable") != "unavailable") | .name' "$f"; done | sort -u
  list_mcp_tools_unavailable: for f in docs/features/*.yml; do case "$(basename "$f")" in _*) continue;; esac; module=$(basename "$f" .yml); yq '.capabilities | to_entries[] | select(.value.mcp == "unavailable" or .value.mcp.status == "unavailable") | {"module":"'"$module"'","capability":.key}' "$f"; done
  list_rest_routes: for f in docs/features/*.yml; do case "$(basename "$f")" in _*) continue;; esac; yq '.capabilities[].rest | select(type == "!!map") | .routes[]?.path' "$f"; done | sort -u
  capabilities_by_auth: for f in docs/features/*.yml; do case "$(basename "$f")" in _*) continue;; esac; module=$(basename "$f" .yml); yq '.capabilities | to_entries[] | {"module":"'"$module"'","capability":.key,"auth":.value.auth}' "$f"; done
  tool_rest_map: for f in docs/features/*.yml; do case "$(basename "$f")" in _*) continue;; esac; yq '.capabilities[].mcp | select(type == "!!map") | .tools[]? | select(.rest_equivalent) | {"tool":.name,"rest":.rest_equivalent}' "$f"; done
  rest_returns_map: for f in docs/features/*.yml; do case "$(basename "$f")" in _*) continue;; esac; yq '.capabilities[].rest | select(type == "!!map") | .routes[]? | select(.returns) | {"path":.path,"method":(.method // "GET"),"returns":.returns}' "$f"; done
  capabilities_no_rest: for f in docs/features/*.yml; do case "$(basename "$f")" in _*) continue;; esac; module=$(basename "$f" .yml); yq '.capabilities | to_entries[] | select(.value.rest == "unavailable" or .value.rest.status == "unavailable" or (.value.rest | not)) | {"module":"'"$module"'","capability":.key,"title":.value.title}' "$f"; done
  capabilities_planned: for f in docs/features/*.yml; do case "$(basename "$f")" in _*) continue;; esac; module=$(basename "$f" .yml); yq '.capabilities | to_entries[] | select(.value.rest == "planned" or .value.rest.status == "planned" or .value.mcp == "planned" or .value.mcp.status == "planned") | {"module":"'"$module"'","capability":.key}' "$f"; done
  rules_by_module: for f in docs/features/*.yml; do case "$(basename "$f")" in _*) continue;; esac; module=$(basename "$f" .yml); yq '{"module":"'"$module"'","rule_ids":(.rules | keys)}' "$f"; done
  model_fields: yq 'to_entries[] | {"model":.key,"fields":(.value.fields | keys)}' docs/features/_models.yml
version: 1.0.0
