meta:
  name: Life@USTC
  language: en
  file: docs/features.yml
  query: yq
  queries:
    list_modules: yq '.modules | keys' docs/features.yml
    list_models: yq '.models | keys' docs/features.yml
    list_enums: yq '.enums | keys' docs/features.yml
    list_mcp_tools_stable: yq '[.modules[].capabilities[].mcp | select(type == "!!map") | .tools[]? | select((.status // "stable") != "unavailable") | .name] | unique' docs/features.yml
    list_mcp_tools_unavailable: "yq '([.modules | to_entries[] | . as $m | .value.capabilities | to_entries[] | select(.value.mcp == \"unavailable\" or .value.mcp.status == \"unavailable\") | {\"module\": $m.key, \"capability\": .key}] + [.modules | to_entries[] | . as $m | .value.capabilities | to_entries[] | . as $c | .value.mcp | select(type == \"!!map\") | .tools[]? | select(.status == \"unavailable\") | {\"module\": $m.key, \"capability\": $c.key, \"tool\": .name}])' docs/features.yml"
    list_rest_routes: yq '[.modules[].capabilities[].rest | select(type == "!!map") | .routes[]?.path] | unique' docs/features.yml
    capabilities_by_auth: "yq '[.modules | to_entries[] | . as $m | .value.capabilities | to_entries[] | {\"module\": $m.key, \"capability\": .key, \"auth\": .value.auth}]' docs/features.yml"
    tool_rest_map: "yq '[.modules[].capabilities[].mcp | select(type == \"!!map\") | .tools[]? | select(.rest_equivalent) | {\"tool\": .name, \"rest\": .rest_equivalent}]' docs/features.yml"
    rest_returns_map: "yq '[.modules[].capabilities[].rest | select(type == \"!!map\") | .routes[]? | select(.returns) | {\"path\": .path, \"method\": (.method // \"GET\"), \"returns\": .returns}]' docs/features.yml"
    capabilities_no_rest: "yq '[.modules | to_entries[] | . as $m | .value.capabilities | to_entries[] | select(.value.rest == \"unavailable\" or .value.rest.status == \"unavailable\" or (.value.rest | not)) | {\"module\": $m.key, \"capability\": .key, \"title\": .value.title}]' docs/features.yml"
    capabilities_planned: "yq '[.modules | to_entries[] | . as $m | .value.capabilities | to_entries[] | select(.value.rest == \"planned\" or .value.rest.status == \"planned\" or .value.mcp == \"planned\" or .value.mcp.status == \"planned\") | {\"module\": $m.key, \"capability\": .key}]' docs/features.yml"
    rules_by_module: "yq '.modules | to_entries[] | {\"module\": .key, \"rule_ids\": (.value.rules | keys)}' docs/features.yml"
    model_fields: "yq '.models | to_entries[] | {\"model\": .key, \"fields\": (.value.fields | keys)}' docs/features.yml"
  version: 1.0.0
product:
  priority:
    - student learning workspace
    - public campus info browser
    - controlled REST / MCP surface
    - admin maintenance surface
  surfaces:
    - web
    - rest
    - mcp
  roles:
    anon: Unauthenticated visitor; can browse all public information.
    user: Authenticated, non-suspended user; can manage personal state and perform social actions.
    admin: Platform administrator; has governance, moderation, and maintenance capabilities.
    agent: OAuth-authorized third-party client or MCP caller; inherits user permissions after authorization; does not inherit admin by default.
  terms:
    sectionSubscription: In-app follow relationship; not equivalent to official course enrollment.
    homework: Class-attached learning task; completion state is tracked per user independently.
    todo: Personal user task; not attached to any class.
  workflow:
    - Update docs/features.yml first whenever capabilities, tool surfaces, parameters, or outputs change.
    - Use yq to inspect the affected semantic blocks while editing.
    - Implement the behavior change in code.
    - Check docs/features.yml, AGENTS.md, and implementation for consistency before concluding.
  display_conventions:
    real-models-only: models mirrors prisma/schema.prisma model fields; API return DTO names stay in returns only.
    compact-surfaces: surface status defaults to stable; use unavailable/planned/stable string shorthand when no page, route, tool, or group is listed.
    inherited-auth: route and tool auth inherit capability auth unless explicitly overridden.
    compact-display: display uses fields and filters only; keep field lists short and user-visible.
models:
  AdminClass:
