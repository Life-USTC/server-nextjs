      id: Int @id @default(autoincrement())
      jwId: Int? @unique
      code: String?
      grade: String?
      nameCn: String @unique
      nameEn: String?
      stdCount: Int?
      planCount: Int?
      enabled: Boolean?
      abbrZh: String?
      abbrEn: String?
