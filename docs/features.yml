  oauth:
    name: OAuth
    access:
      anon: When accessing the authorization page, will first be guided to sign in.
      user: Can only approve or reject third-party client authorization requests.
      admin: Can manage OAuth clients in the admin backend.
      agent: Accesses restricted capabilities after obtaining a token through the standard authorization flow.
    rules:
      auth-page-clarity: The authorization page must clearly display the application name, requested permissions, approve action, and reject action.
      user-consent-framing: Users see 'what this app wants and whether I allow it', not technical protocol details.
      dcr-via-provider: Dynamic client registration is handled by the standard /oauth2/register path of the Better Auth OAuth provider; the project no longer maintains a parallel hand-written DCR persistence logic.
      dcr-rules-from-provider: Default scopes, allowed scopes, public/confidential restrictions, and PKCE rules for DCR should be uniformly decided by the Better Auth provider configuration, not re-implemented as an approximate set of rules at the application layer.
      trusted-clients-admin-backend: First-party / internal applications prefer using trusted OAuth clients created in the admin backend; such clients can skip consent and can further be incorporated into the Better Auth provider's trusted / cached client scheme when needed, rather than relying on public DCR.
      public-clients-pkce: Public MCP / CLI / native clients use public + PKCE mode; admin copy and grouping should explicitly separate trusted first-party from external/public to reduce admin misconfiguration probability.
      client-validation-from-provider: When creating clients in the admin backend, redirect URI and client metadata validation should preferentially reuse the rules of the Better Auth OAuth provider, no longer maintaining a local forked rule document.
      loopback-redirect-tolerance: For public native clients with loopback redirect URIs, the server should accommodate the hostname alias difference between 127.0.0.1 and localhost to avoid DCR registration and authorization requests failing solely due to these two local loopback representations; beyond this, strict matching is maintained for path, query, scheme, and non-loopback host rules.
      device-grant-custom: The device authorization flow is currently still implemented by the project as a custom implementation, because the existing Better Auth device-authorization plugin returns a session token rather than the OAuth bearer-token / refresh-token semantics of this project; it should not be forcibly replaced until the provider natively supports the OAuth device grant.
      oauth-proxy-for-dev: Local development and preview deployments without fixed hostnames can reuse the production site's registered provider callback address through an OAuth proxy; after the preview/local instance shares the proxy encryption key with the production instance, the production site completes the provider callback and sends the encrypted user profile back to the current instance to establish a local session.
      as-metadata-canonical-path: For OAuth issuers with a path (currently /api/auth), the canonical entry for authorization server metadata should be /.well-known/oauth-authorization-server/api/auth; the root-level /.well-known/oauth-authorization-server serves only as a compatibility alias redirect to the canonical address, to avoid returning metadata inconsistent with the issuer at the root level.
      oidc-discovery-canonical-path: For OpenID issuers with a path (currently /api/auth), the canonical entry for OIDC Discovery should be /api/auth/.well-known/openid-configuration, with /.well-known/openid-configuration/api/auth also provided as an RFC 8414 compatible path; the root-level /.well-known/openid-configuration serves only as a compatibility alias redirect to the canonical address.
      protected-resource-canonical-path: For protected resources with a path (currently MCP resource /api/mcp), the canonical entry per RFC 9728 should be /.well-known/oauth-protected-resource/api/mcp; the root-level /.well-known/oauth-protected-resource serves only as a compatibility alias redirect to the canonical address, to avoid returning metadata inconsistent with the resource field.
      aliases-use-redirect: Compatibility aliases should use redirects rather than redundantly returning a JSON that looks usable but is inconsistent with issuer/resource validation, so that clients ultimately complete metadata validation at the canonical address.
      discovery-cors: "Discovery metadata should support cross-origin reading; at minimum return Access-Control-Allow-Origin: * for OpenID discovery, and keep the CORS behavior of authorization server metadata and protected resource metadata consistent, reducing compatibility risks for browser-type clients and debugging tools."
    capabilities:
      authorization:
        title: Authorization
        auth: anon
        web:
          status: stable
          pages:
          - /oauth/authorize
          notes:
          - Displays client name and requested scopes.
        rest:
          status: stable
          notes:
          - The authorization protocol is handled by authentication routes.
      client-registration:
        title: Client Registration & Discovery
        auth: admin
        web:
          status: stable
          pages:
          - /admin/oauth
          notes:
          - The admin backend displays OAuth client management capabilities.
        rest:
          status: stable
          routes:
          - path: /api/auth/.well-known/openid-configuration
            method: GET
            returns: "OIDCDiscoveryDocument"
            auth: anon
          - path: /api/auth/oauth2/register
            method: POST
            returns: "OAuthClientRegistration"
            auth: anon
          - path: /.well-known/oauth-authorization-server/api/auth
            method: GET
            returns: "OAuthAuthorizationServerMetadata"
            auth: anon
          - path: /.well-known/openid-configuration/api/auth
            method: GET
            returns: "OIDCDiscoveryDocument"
            auth: anon
          - path: /.well-known/oauth-protected-resource/api/mcp
            method: GET
            returns: "OAuthProtectedResourceMetadata"
            auth: anon
        mcp:
          status: unavailable
          notes:
          - No OAuth management capability is provided.
      device-authorization-grant:
        title: Device Authorization Grant (RFC 8628)
        auth: anon
        web:
          status: stable
          pages:
          - /oauth/device
          notes:
          - Users enter the device code (user_code) on this page; upon confirmation, they approve or reject the device sign-in request.
          - When unsigned-in users access this page, they are first directed to the sign-in page and automatically return to the device verification page after signing in.
          - Supports pre-filling the device code via the code query parameter in verification_uri_complete.
        rest:
          status: stable
          routes:
          - path: /api/auth/oauth2/device-authorization
            method: POST
            returns: "{ device_code, user_code, verification_uri, verification_uri_complete, expires_in, interval }"
            auth: anon
            notes:
            - Request body is application/x-www-form-urlencoded.
            - "Supports CORS (Access-Control-Allow-Origin: *)."
            - .well-known/openid-configuration already includes device_authorization_endpoint and urn:ietf:params:oauth:grant-type:device_code in grant_types_supported.
          - path: /api/auth/oauth2/token
            method: POST
            returns: "{ access_token, token_type, expires_in, refresh_token? } | { error }"
            auth: anon
            notes:
            - The device polls this endpoint with grant_type=urn:ietf:params:oauth:grant-type:device_code and device_code to obtain an access token.
            - During polling, returns authorization_pending, slow_down, expired_token, or access_denied error codes based on state.
        mcp:
          status: unavailable
          notes:
          - Not applicable; the device authorization flow completes before MCP establishes a connection.
  webhook-login:
    name: Webhook Login
    access:
      anon: Not applicable.
      user: Not applicable.
      admin: Must hold the WEBHOOK_SECRET environment variable value.
      agent: Not applicable.
    rules:
      requires-secret: Only available when the server is configured with the WEBHOOK_SECRET environment variable; all requests return 403 when not configured.
      debug-only: Used for passwordless login in production debugging scenarios; not a regular user sign-in entry point.
      session-via-betterauth: Locates the target user by email or userId and establishes a session via Better Auth session primitives; no longer hand-writes session cookie signing.
    capabilities:
      webhook-login:
        title: Webhook Login
        auth: admin
        web:
          status: unavailable
          notes:
          - Not applicable; no corresponding web entry.
        rest:
          status: stable
          routes:
          - path: /api/auth/webhook/login
            method: POST
            returns: "{ ok: Boolean, userId: String, email: String, sessionToken: String, expires: DateTime }"
            auth: admin
            notes:
            - Request body is JSON.
            - Also sets the better-auth.session_token cookie.
  openapi:
    name: REST / OpenAPI
    access:
      anon: Can browse API documentation and public REST capabilities.
      user: When signed in, can call their own restricted REST capabilities.
      admin: Calls governance capabilities through the corresponding admin endpoints.
      agent: Can call public REST capabilities and, after OAuth authorization, can call restricted REST and MCP capabilities; both share the same authorization boundary by default.
    rules:
      aligned-with-web: The goal of REST / OpenAPI is to expose capabilities aligned with the web, not to create an additional product layer.
      no-developer-model: Public documentation helps callers understand the existing product capability boundaries, not to introduce a separate developer-specific business model.
      session-and-bearer: Current user-side business REST endpoints support both in-site session from the request cookie and OAuth bearer tokens; bearer-token access is no longer limited to MCP.
      rest-mcp-consistent: The same abstract endpoint currently maintains the same core fields, state information, and action results in both REST and MCP; differences mainly appear in interaction form and serialization level.
    capabilities:
      api-docs-page:
        title: API Docs Page
        auth: anon
        web:
          status: stable
          pages:
          - /api-docs
          notes:
          - Swagger documentation entry.
      openapi-spec:
        title: OpenAPI Spec
        auth: anon
        web:
          status: stable
          notes:
          - The /api-docs page consumes this document.
        rest:
          status: stable
          routes:
          - path: /api/openapi
            method: GET
            returns: "OpenAPI 3.x JSON"
            auth: anon
      business-rest-routes:
        title: Business REST Routes
        auth: anon
        web:
          status: stable
          notes:
          - Page behavior is implemented through corresponding /api/* route calls.
        rest:
          status: stable
          notes:
          - Domain-specific REST endpoints under /api/*.
          - Current user-side protected endpoints support both in-site session from the request cookie and OAuth bearer tokens.
      platform-utility-routes:
        title: Platform Utility Routes
        auth: anon
        rest:
          status: stable
          routes:
          - path: /api/metadata
            method: GET
            returns: "{ educationLevels, courseCategories, campuses, ... }"
            auth: anon
            notes:
            - Returns filter dictionaries (education level, course category, campus, etc.).
          - path: /api/locale
            method: POST
            returns: "{ success: Boolean }"
            auth: anon
            notes:
            - Sets the user language preference cookie.
  mcp:
    name: MCP
    access:
      anon: Cannot call MCP tools that require user context.
      user: After authorization, can call personal workspace-related tools.
      admin: Currently does not automatically gain additional MCP admin tools due to admin status.
      agent: MCP is one of the protocol entry points alongside REST, covering capabilities aligned with the web by default and sharing the same OAuth permission boundary.
    rules:
      personal-workspace-focus: MCP focuses by default on personal learning workspace, public query, and low-risk personal state write capabilities; admin capabilities are not exposed by default.
      text-formatted-json: Current tool output is uniformly text-formatted JSON.
      output-modes: "Output mode has three levels: summary, default, full."
      coverage: MCP currently covers core query tools for courses, sections, teachers, semesters, subscriptions, schedules, and unified calendar events; comment, upload, description governance, link management, and admin capabilities do not yet have corresponding tools.
    capabilities:
      protocol-endpoint:
        title: Protocol Endpoint
        auth: anon
        web:
          status: unavailable
          notes:
          - No standalone MCP Web UI currently exists; the documentation entry remains at /api-docs.
        rest:
          status: stable
          routes:
          - path: /api/mcp
            method: POST
            returns: MCP JSON-RPC response
            auth: anon
            notes:
            - All tool calls are handled through this endpoint.
      tool-groups:
        title: Tool Groups
        auth: anon
        mcp:
          status: stable
          groups:
          - name: Profile & Todo
            tools:
            - get_my_profile
            - list_my_todos
            - create_my_todo
            - update_my_todo
            - delete_my_todo
          - name: Course & Section
            tools:
            - search_courses
            - get_course_by_jw_id
            - search_sections
            - get_section_by_jw_id
            - search_teachers
            - get_teacher_by_id
          - name: Calendar & Timeline
            tools:
            - list_my_calendar_events
            - get_my_7days_timeline
            - get_my_calendar_subscription
          - name: Homework & Exam
            tools:
            - list_my_homeworks
            - set_my_homework_completion
            - list_my_exams
            - list_homeworks_by_section
            - create_homework_on_section
            - update_homework_on_section
            - list_exams_by_section
          - name: Schedule & Subscription
            tools:
            - list_my_schedules
            - list_schedules_by_section
            - query_schedules
            - match_section_codes
            - subscribe_my_sections_by_codes
            - subscribe_section_by_jw_id
            - unsubscribe_section_by_jw_id
            - list_my_subscribed_sections
            - get_section_calendar_subscription
          - name: Semester & Metadata
            tools:
            - list_semesters
            - get_current_semester
          - name: Bus
            tools:
            - query_bus_timetable
            - list_bus_routes
            - get_bus_route_timetable
          - name: Overview
            tools:
            - get_my_overview
  security:
    name: Content / Security
    access:
      anon: Anonymous comments do not expose real identity to regular users; identity is traceable by admins for governance and security processing.
      user: Can post anonymous comments with identity hidden from other users. Uploads and downloads require permission validation. Destructive actions require explicit confirmation.
      admin: Can trace anonymous comment identities in governance scenarios. High-risk actions (delete, suspend, hide) must provide explicit feedback.
      agent: Must maintain the same permission boundaries and error feedback as web/API.
    rules:
      anonymous-and-traceable: Anonymous capability and traceability capability coexist; this is not an either-or design.
      upload-download-both-checked: Both uploads and downloads require permission checks; the security boundary must not apply only to the upload entry point.
    capabilities:
      anonymous-comment-visibility:
        title: Anonymous Comment Visibility
        auth: anon
        web:
          status: stable
          notes:
          - Anonymous to regular users; traceable on the governance side.
        rest:
          status: stable
          notes:
          - Implemented jointly through comment and admin endpoints.
        mcp:
          status: unavailable
          notes:
          - No comment tools are currently provided.
      upload-download-access:
        title: Upload / Download Access Control
        auth: user
        web:
          status: stable
          notes:
          - Both comment attachment upload and download require permission validation.
        rest:
          status: stable
          notes:
          - Permissions are validated through the upload and download endpoints.
        mcp:
          status: unavailable
          notes:
          - No upload tools are currently provided.
      destructive-action-confirmation:
        title: Destructive Action Confirmation
        auth: user
        web:
          status: stable
          notes:
          - "Operations requiring confirmation include at minimum: disconnecting an OAuth account, batch section subscription, account deletion, deleting a comment, deleting homework, and unsubscribing in the subscribed sections list."
          - "Lightweight operations that typically do not require confirmation include: single subscribe/unsubscribe on the section detail page, homework completion state toggle, todo completion state toggle, comment reactions, and pinning/unpinning links."
        rest:
          status: stable
          notes:
          - Must maintain the same permission boundaries and error feedback as the web.
        mcp:
          status: stable
          notes:
          - Must maintain the same permission boundaries as web/API.
cases:
  semester:
    affects:
    - module: overview
      capability: authenticated-overview
    - module: subscription
      capability: batch-subscribe-by-codes
    - module: subscribed-sections
      capability: subscribed-sections-tab
    rules:
      no-current-semester:
      - The home page should display a recoverable empty state.
      - Users should be guided to browse or import sections.
      only-non-current-semester-subscriptions:
      - The home page must not pretend to have current learning tasks.
      - Must clearly indicate that no sections are subscribed for the current semester.
      cross-semester-browsing:
      - Courses must display semester.
      - Sections must display semester.
      - Homework must display semester.
      - Exams must display semester.
    decisions:
    - When the current semester does not exist, the home page should enter a recoverable empty state rather than rendering a misleading empty list.
    - When only non-current-semester sections are subscribed, the user must be clearly told 'no content subscribed for the current semester' rather than pretending everything is normal.
  disambiguation:
    affects:
    - module: course
      capability: course-list
    - module: section
      capability: section-list
    - module: subscription
      capability: batch-subscribe-by-codes
    rules:
      duplicate-course-names:
      - Course code or other disambiguation information should be displayed.
      multiple-sections-same-course:
      - Section code and semester should be displayed.
      required-disambiguation-contexts:
      - Section search.
      - Child sections in course detail.
      - Batch import results.
    decisions:
    - Whenever there is a risk of ambiguity, list views must prioritize displaying fields that help make a selection.
    - Courses with the same name and multiple sections under the same course must not display only the course name.
    - In cross-semester or multi-section scenarios, semester and section code are mandatory information to retain.
  missing-data:
    affects:
    - module: schedule
      capability: section-schedule
    - module: exam
      capability: section-exam-info
    - module: homework
      capability: section-homework-tab
    - module: ical
    rules:
      section-missing-teacher-location-or-exam:
      - A default empty state should be displayed.
      - The entire object must not be hidden.
      homework-no-due-date:
      - Does not enter the 'upcoming due' sort.
      - Can still be viewed in the homework list.
      ical-no-events:
      - A valid but empty or informational calendar content should be returned.
    decisions:
    - When fields are missing, prefer showing a default empty state rather than hiding the entire object.
    - Homework with no due date retains visibility but does not mix into upcoming due date sorting.
    - When iCal has no events, a valid result should still be returned to prevent clients from failing on 'empty'.
  account:
    affects:
    - module: user
      capability: settings
    - module: user
      capability: public-profile
    rules:
      username-change:
      - The new profile page should be accessible.
      - The old username must not continue to represent the user.
      oauth-connection-error:
      - Duplicate OAuth connection should give a clear error response.
      - Disconnecting the last account should give a clear error response.
      account-deletion:
      - The user must be required to enter a confirmation word.
      - After successful deletion, the current session should be terminated and the settings page exited.
    decisions:
    - After a username change, the new address should immediately become the canonical entry.
    - The old username must not continue to represent the user for an extended period to avoid identity confusion.
    - Disconnecting the last sign-in account is an error operation that must be blocked, not an ordinary failure-retry scenario.
    - Account deletion carries higher risk than ordinary destructive operations; the current implementation requires entering the fixed confirmation word DELETE.
  content-security:
    affects:
    - module: comment
      capability: object-comment-section
    - module: upload
      capability: comment-attachment-download
    - module: security
      capability: destructive-action-confirmation
    rules:
      suspended-user:
      - Cannot post new comments.
      upload-attachment-download:
      - Access permissions must be validated.
      destructive-actions:
      - Deletion must have explicit feedback.
      - Suspension must have explicit feedback.
      - Hiding must have explicit feedback.
    decisions:
    - Suspended users cannot post new comments; this restriction must hold at both the product layer and the permission layer.
    - Upload attachment download must re-validate access permissions; it must not assume that having the link is sufficient to download.
    - High-risk operations use explicit feedback mechanisms.
audit:
  fields:
    id:
      type: String (cuid)
      note: Primary key
    action:
      type: AuditAction
      note: Enum value (see below)
    userId:
      type: String
      note: Actor who performed the action
    targetId:
      type: String?
      note: ID of the affected object
    targetType:
      type: String?
      note: '"comment", "description", "upload", "user"'
    metadata:
      type: Json?
      note: Extra context (body snippet, reason, etc.)
    ipAddress:
      type: String?
      note: From x-forwarded-for / x-real-ip
    userAgent:
      type: String?
      note: From user-agent header
    createdAt:
      type: DateTime
      note: When the action occurred
  actions:
    comment_create:
      trigger: POST /api/comments
      description: User creates a new comment on an object.
    comment_edit:
      trigger: PATCH /api/comments/[id]
      description: User edits their own comment.
    comment_delete:
      trigger: DELETE /api/comments/[id]
      description: User or admin deletes a comment.
    comment_react:
      trigger: POST /api/comments/[id]/reactions
      description: User adds or removes a reaction on a comment.
    description_edit:
      trigger: POST /api/descriptions
      description: User updates an object description (content changed).
    upload_delete:
      trigger: DELETE /api/uploads/[id]
      description: User or admin deletes an upload.
    admin_user_suspend:
      trigger: POST /api/admin/suspensions
      description: Admin suspends a user account.
    admin_user_unsuspend:
      trigger: PATCH /api/admin/suspensions/[id]
      description: Admin lifts a user suspension.
    admin_comment_moderate:
      trigger: PATCH /api/admin/comments/[id]
      description: Admin hides or moderates a comment.
    admin_description_moderate:
      trigger: Reserved
      description: Reserved for future admin description moderation actions.
  writer: writeAuditLog in src/lib/audit/write-audit-log.ts writes a record. Calls are fire-and-forget (.catch(() => {})) so audit failures never block the main request.
