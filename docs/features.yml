      - "@@index([code])"
      - "@@index([nameCn])"
      - "@@index([nameEn])"
      - "@@index([categoryId])"
      - "@@index([classTypeId])"
      - "@@index([classifyId])"
      - "@@index([educationLevelId])"
      - "@@index([gradationId])"
      - "@@index([typeId])"
  CourseCategory:
