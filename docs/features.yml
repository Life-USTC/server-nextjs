  comment:
    name: Comment
    access:
      anon: Can read public comments but cannot create sign-in-required comments.
      user: Can post, reply, react, edit, and delete their own comments; suspended users cannot post new comments.
      admin: Can hide, delete, and moderate comments, and handle reports or suspensions.
      agent: No comment read/write capability is currently provided.
    rules:
      attached-to-object: Comments must be attached to a specific object; no decontextualized public feed entry is provided.
      attached-object-types: Attached objects include courses, sections, teachers, homework, and section-teacher relationships.
      rich-content: Supports Markdown, math formulas, emoji, tables, replies, and reactions.
      visibility-modes: Supports public, signed-in-only, and anonymous posting; anonymous comments hide identity from regular users but are traceable by admins in governance scenarios.
    capabilities:
      object-comment-section:
        title: Object Comment Section
        auth: anon
        web: stable
        rest:
          routes:
            - path: /api/comments
              returns: "{ comments: Comment[], hiddenCount: Int, viewer, target }"
            - path: /api/comments
              method: POST
              returns: "{ id: String }"
              auth: user
            - path: /api/comments/[id]
              method: PATCH
              returns: "{ success: Boolean, comment: Comment }"
              auth: user
            - path: /api/comments/[id]
              method: DELETE
              returns: "{ success: Boolean }"
              auth: user
            - path: /api/comments/[id]/reactions
              method: POST
              returns: "{ success: Boolean }"
              auth: user
            - path: /api/comments/[id]
              returns: "{ thread: Comment[], focusId: String, hiddenCount: Int, viewer, target }"
            - path: /api/comments/[id]/reactions
              method: DELETE
              returns: "{ success: Boolean }"
              auth: user
        mcp: unavailable
        display:
          fields:
            - comment.id
            - comment.author.name
            - comment.author.image (avatar)
            - comment.body (markdown-rendered)
            - comment.createdAt (timestamp)
            - comment.updatedAt / edited timestamp
            - comment.visibility badges
            - comment.status (non-active states)
            - comment.reactions[] (counts per reaction type)
            - comment.replies[] (threaded)
            - comment.attachments[] filename/open action
            - canReply/canEdit/canModerate actions
            - Copy link action
      comment-governance:
        title: Comment Governance
        auth: admin
        web:
          pages:
            - /admin/moderation
        rest:
          routes:
            - path: /api/admin/comments
              returns: "{ comments: Comment[] }"
            - path: /api/admin/comments/[id]
              method: PATCH
              returns: "{ comment: Comment }"
            - path: /api/admin/suspensions
              method: POST
              returns: "{ suspension: Suspension }"
            - path: /api/admin/suspensions/[id]
              method: PATCH
              returns: "{ suspension: Suspension }"
        mcp: unavailable
        display:
          fields:
            - comment.body/content preview
            - comment.author.name
            - target object
            - creation timestamp
            - "Status: active/softbanned/deleted"
            - Suspended filter
            - Status radio + confirm action
            - Suspension controls
      comment-auxiliary-pages:
        title: Comment Auxiliary Pages
        auth: anon
        web:
          pages:
            - /comments/[id]
            - /comments/guide
        display:
          fields:
            - Comment guidelines/help pages
  description:
    name: Description
    access:
      anon: Can read public descriptions.
      user: When signed in and not suspended, can maintain descriptions.
      admin: Can review and maintain descriptions in the admin backend.
      agent: No general description tools are currently provided.
    rules:
      supplement-not-comment: Description is a Markdown supplement on an object, not equivalent to comments expressing personal opinions.
      attached-object-types: Attached objects include courses, sections, teachers, homework, and similar.
      platform-maintained: When descriptions conflict with personal experiences in comments, descriptions are treated as platform-maintained information by default.
    capabilities:
      object-description-section:
        title: Object Description Section
        auth: anon
        web: stable
        rest:
          routes:
            - path: /api/descriptions
              returns: "{ description, history, viewer }"
            - path: /api/descriptions
              method: POST
              returns: "{ id: String, updated: Boolean }"
              auth: user
        mcp: unavailable
        display:
          fields:
            - description.content (markdown-rendered)
            - description.lastEditedBy.name
            - description.lastEditedAt / updatedAt
            - Edit button (if authorized)
            - history count
            - history editor
            - previous/updated diff content
      description-governance:
        title: Description Governance
        auth: admin
        web:
          pages:
            - /admin/moderation
        rest:
          routes:
            - path: /api/admin/descriptions
              returns: "{ descriptions: Description[] }"
        mcp: unavailable
        display:
          fields:
            - description.content / preview
            - object target
            - lastEditedBy name
            - timestamp
  upload:
    name: Upload
    access:
      anon: Cannot upload attachments.
      user: Can upload in the comment attachment flow; download permissions must be re-validated.
      admin: No standalone public 'upload management console' currently exists.
      agent: No upload capability is currently provided.
    rules:
      comment-attachments-only: Uploads serve only comment attachments; they are not an independent file space.
      permission-and-quota: Permission and quota checks are required before upload.
      three-step-upload: Web comment attachment uploads follow a three-step flow — create upload session on-site → browser direct upload to S3-compatible pre-signed URL generated by AWS SDK → confirm completion on-site; page CSP must allow the signed storage origin actually used by the upload backend, including AWS S3 virtual-hosted / path-style addresses or compatible backend addresses via custom endpoint configuration.
      s3-compatible-backend: The storage backend operates with AWS SDK S3-compatible configuration; defaults to AWS S3 but allows connecting to compatible backends via custom endpoint.
      e2e-local-s3: E2E tests use a local S3-compatible test endpoint by default; external storage is only used when an available S3 environment is explicitly provided.
      download-auth-required: Downloads must not bypass authorization by obtaining a direct link.
      download-signed-url: /api/uploads/[id]/download only returns a short-lived signed download URL redirect, not a stable long-reusable object direct link.
    capabilities:
      upload-list:
        title: Upload List
        auth: user
        web: stable
        rest:
          routes:
            - path: /api/uploads
              returns: "{ maxFileSizeBytes, quotaBytes, uploads: Upload[], usedBytes }"
              notes:
                - The same path currently handles both 'read upload quota / history' and 'create upload session' capabilities.
        mcp: unavailable
        display:
          fields:
            - upload.filename
            - upload.size (formatted bytes)
            - upload.createdAt
            - usedBytes
            - quotaBytes
            - maxFileSizeBytes
      comment-attachment-upload:
        title: Comment Attachment Upload
        auth: user
        web: stable
        rest:
          routes:
            - path: /api/uploads
              method: POST
              returns: "{ key: String, url: String, maxFileSizeBytes: Int, quotaBytes: Int, usedBytes: Int }"
            - path: /api/uploads/complete
              method: POST
              returns: "{ upload: Upload, usedBytes: Int, quotaBytes: Int }"
        mcp: unavailable
        display:
          fields:
            - File input
            - File preview
            - upload progress indicator
            - Cancel button
      comment-attachment-download:
        title: Comment Attachment Download
        auth: user
        web: stable
        rest:
          routes:
            - path: /api/uploads/[id]/download
              returns: 302 redirect to signed URL
              notes:
                - Validates access permissions before redirecting to a short-lived signed URL.
        mcp: unavailable
        display:
          fields:
            - attachment filename
            - Open/download button
  bus:
    name: Bus
    access:
      anon: Can query bus information.
      user: Can query bus information and save preferences.
      admin: Can maintain bus data.
      agent: Can read bus timetable capabilities.
    rules:
      public-no-signin: Bus is public campus life information; sign-in should not be a prerequisite.
      weekday-by-client-time: The dashboard bus page determines weekday/weekend by the user's local time on the client side by default and allows manual switching.
      shanghai-time-interpretation: When calculating 'how long until departure', whether a trip has departed, and route ordering, the dashboard client interprets HH:mm times in the timetable uniformly as Shanghai Time, not changing with the browser's timezone.
      core-filters-only: The dashboard bus page provides only core filters for departure stop, arrival stop, direction reversal, and 'show already-departed trips'; departure and arrival stops use a directly clickable vertical stop column to avoid secondary dropdowns, maintaining clear departure/arrival hierarchy.
      visual-priority: The dashboard visual structure should prioritize 'quick scanning of the next trip and route differences'; selected stop, direction, next departure time, and route grouping must be more prominent than decorative cards.
      sort-by-next-boardable: Routes are currently sorted by 'the next boardable time from the selected departure stop'; if a stop has no exact time in the original timetable, the average of adjacent known stop times in the same trip is used as an estimate.
      merged-table-grouped-by-route: The dashboard main view uses a single merged large table to display all applicable routes, grouped into table sections by route; each section shows the visible trips for that route.
      raw-data-returned: /api/bus and query_bus_timetable return raw route/stop/trip data within the selected timetable version; the preferences field is null for anonymous callers and returns the authenticated caller's saved preferences; the server does not pre-apply recommendations, filtering, or sorting.
      current-version-only: list_bus_routes only lists routes actually present in the current active timetable version; it does not expose historical route IDs outside the current version.
      dashboard-vs-map: The dashboard prioritizes answering 'how to get the next trip'; the map page handles spatial understanding.
      task-oriented-tool-hierarchy: Use query_bus_timetable for raw/full datasets, list_bus_routes for unfiltered discovery, search_bus_routes for filtered discovery, get_bus_route_timetable for one route, and get_next_buses for immediate departure answers.
      summary-mode-compact: query_bus_timetable summary mode should return compact counts, route/campus summaries, and only a few relevant departures rather than the full trip dataset.
    capabilities:
      bus-dashboard:
        title: Bus Dashboard
        auth: anon
        web:
          pages:
            - /?tab=bus
        rest:
          routes:
            - path: /api/bus
              returns: "{ locale, fetchedAt, version, availableVersions, campuses, routes, trips, preferences, notice }"
            - path: /api/bus/preferences
              method: POST
              returns: "{ preference: BusPreferences }"
              auth: user
            - path: /api/bus/preferences
              returns: "{ preference: BusPreferences }"
              auth: user
        mcp:
          tools:
            - name: query_bus_timetable
              returns: "{ locale, fetchedAt, version, availableVersions, campuses, routes, trips, preferences, notice }"
              rest_equivalent: GET /api/bus
              notes:
                - summary mode returns a compact assistant-oriented snapshot with counts, summarized campuses/routes, and only a few nextDepartures instead of the full trip dataset.
                - default mode also stays assistant-oriented and compact; request full mode for the raw campuses/routes/trips dataset.
            - name: list_bus_routes
              returns: "{ routes: BusRoute[], campuses: BusCampus[] }"
              rest_equivalent: GET /api/bus
              notes:
                - Use this for full current-version route discovery before fetching one route timetable.
            - name: get_bus_route_timetable
              returns: "{ route: BusRoute, weekday, weekend, alternateRoutes }"
              rest_equivalent: GET /api/bus
              notes:
                - Single-route raw timetable tool; use get_next_buses when the caller only needs the next few departures.
        display:
          fields:
            - route.descriptionPrimary
            - next departure times
            - campus stop columns
            - route schedules
            - day type control
            - departure/arrival campus controls
            - reverse direction control
            - show-departed toggle
      bus-route-search:
        title: Bus Route Search
        auth: anon
        web: unavailable
        rest: unavailable
        mcp:
          tools:
            - name: search_bus_routes
              returns: "{ originCampus?, destinationCampus?, total: Int, routes: BusRouteSearchResult[] }"
              notes:
                - Filtered discovery helper for origin/destination prompts.
                - Use list_bus_routes when the caller needs the entire current route catalog.
        display:
          fields:
            - originCampus
            - destinationCampus
            - filtered route list
            - route stop order
            - weekday/weekend trip counts
      bus-next-departures:
        title: Bus Next Departures
        auth: user
        web: unavailable
        rest: unavailable
        mcp:
          tools:
            - name: get_next_buses
              returns: "{ originCampus, destinationCampus, atTime, dayType, totalRoutes: Int, departures: BusDeparture[] }"
              notes:
                - Task-oriented convenience tool for 'when is the next bus?' prompts.
                - "Default parameters: dayType=auto, includeDeparted=false, limit=5."
                - When a route exists but no remaining departures are available for the requested window, return guidance describing the situation and, when possible, the next available service time.
                - Default/summary responses should avoid repeating the same originCampus/destinationCampus object inside every departure item when they already appear at the top level.
        display:
          fields:
            - originCampus
            - destinationCampus
            - dayType
            - departureTime
            - arrivalTime
            - minutesUntilDeparture
            - route description
      bus-map:
        title: Bus Route Map
        auth: anon
        web:
          pages:
            - /bus-map
        rest: unavailable
        mcp: unavailable
        display:
          fields:
            - Bus routes (polylines on map)
            - Bus stops/stations (markers)
            - Active trips derived from timetable times
            - Campus locations reference
            - Interactive map controls
  dashboard-link:
    name: Dashboard Link
    access:
      anon: Can browse frequent links but cannot pin them.
      user: Can pin, unpin, and record link visits.
      admin: Has no dedicated link management interface separate from regular users.
      agent: No frequent link management capability is currently provided.
    rules:
      navigation-not-feed: Frequent links are a navigation capability, not a content feed.
      search-fuzzy: Search supports Chinese, pinyin, and whitespace-tolerant matching.
      links-vs-buttons: Links are for navigation; buttons are for actions.
      pin-limit: Currently a maximum of 5 links can be pinned; exceeding this displaces the earliest pinned link.
      pin-error-clear: When pin/unpin writes fail, the endpoint returns a clear error; failures are not disguised as successes.
    capabilities:
      link-browse:
        title: Link Browse & Search
        auth: anon
        web:
          pages:
            - /?tab=links
            - /?tab=overview
        rest: unavailable
        mcp: unavailable
        display:
          fields:
            - link.title
            - link.description
            - link.icon
            - link.slug visit action
            - link.group
            - link.isPinned (if authenticated)
            - Search input/query
      link-pin-and-visit:
        title: Link Pin & Visit
        auth: user
        web: stable
        rest:
          routes:
            - path: /api/dashboard-links/pin
              method: POST
              returns: "{ pinnedSlugs: String[], maxPinnedLinks: Int, error?: String }"
            - path: /api/dashboard-links/visit
              method: POST
              returns: 303 redirect
            - path: /api/dashboard-links/visit
              returns: 303 redirect
        mcp: unavailable
        display:
          fields:
            - link.slug visit action
            - Pin/unpin button
            - Pinned indicator
  admin:
