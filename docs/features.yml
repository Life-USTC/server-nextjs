      - "@@index([courseId])"
      - "@@index([semesterId])"
      - "@@index([examModeId])"
      - "@@index([campusId])"
      - "@@index([openDepartmentId])"
      - "@@index([roomTypeId])"
      - "@@index([teachLanguageId])"
