# schema: ./features.schema.json
meta:
  name: Life@USTC
  language: en
  file: docs/features.yml
  query: yq
  queries:
    list_modules: "yq '.modules | keys' docs/features.yml"
    list_models: "yq '.models | keys' docs/features.yml"
    list_mcp_tools_stable: "yq '[.modules[].capabilities[].mcp.tools[]? | select((.status // \"stable\") != \"unavailable\") | .name]' docs/features.yml"
    list_mcp_tools_unavailable: "yq '[.modules[].capabilities[].mcp.tools[]? | select(.status == \"unavailable\") | .name]' docs/features.yml"
    list_rest_routes: "yq '[.modules[].capabilities[].rest.routes[]?.path] | unique' docs/features.yml"
    capabilities_by_auth: "yq '[.modules | to_entries[] | {\"module\": .key, \"restricted\": [.value.capabilities | to_entries[] | select(.value.auth != null) | .key]}]' docs/features.yml"
    tool_rest_map: "yq '[.modules[].capabilities[].mcp.tools[]? | select(.rest_equivalent) | {\"tool\": .name, \"rest\": .rest_equivalent}]' docs/features.yml"
    rest_returns_map: "yq '[.modules[].capabilities[].rest.routes[]? | select(.returns) | {\"path\": .path, \"method\": (.method // \"GET\"), \"returns\": .returns}]' docs/features.yml"
    capabilities_no_rest: "yq '[.modules | to_entries[] | .value.capabilities | to_entries[] | select(.value.rest.status == \"unavailable\" or (.value.rest | not)) | {\"module\": .key, \"cap\": .key, \"title\": .value.title}]' docs/features.yml"
    capabilities_planned: "yq '[.modules | to_entries[] | .value.capabilities | to_entries[] | select(.value.rest.status == \"planned\" or .value.mcp.status == \"planned\") | {\"module\": .key, \"cap\": .key}]' docs/features.yml"
    rules_by_module: "yq '.modules | to_entries[] | {\"module\": .key, \"rule_ids\": (.value.rules | keys)}' docs/features.yml"
    model_types: "yq '.models | to_entries[] | {\"model\": .key, \"types\": .value.types}' docs/features.yml"
product:
  priority:
  - student learning workspace
  - public campus info browser
  - controlled REST / MCP surface
  - admin maintenance surface
  surfaces:
  - web
  - rest
  - mcp
  roles:
    anon: Unauthenticated visitor; can browse all public information.
    user: Authenticated, non-suspended user; can manage personal state and perform social actions.
    admin: Platform administrator; has governance, moderation, and maintenance capabilities.
    agent: OAuth-authorized third-party client or MCP caller; inherits user permissions after authorization; does not inherit admin by default.
  terms:
    sectionSubscription: In-app follow relationship; not equivalent to official course enrollment.
    homework: Class-attached learning task; completion state is tracked per user independently.
    todo: Personal user task; not attached to any class.
  workflow:
  - Edit docs/features.yml first.
  - Use yq to inspect the affected semantic blocks while editing.
  - Implement the behavior change in code.
  - Reconcile the YAML if implementation scope changed.
models:
  SemesterSummary:
    fields:
      identity:
      - semester.id
      - semester.jwId
      - semester.code
      name-and-dates:
      - semester.nameCn
      - semester.startDate
      - semester.endDate
    types:
      semester.id: String (cuid)
      semester.jwId: String
      semester.code: String
      semester.nameCn: String
      semester.startDate: Date
      semester.endDate: Date
  CourseSummary:
    fields:
      identity:
      - course.id
      - course.jwId
      - course.code
      primary-display:
      - course.namePrimary
      - course.nameSecondary
      classification:
      - course.educationLevel?.namePrimary
      - course.category?.namePrimary
      - course.classType?.namePrimary
      - course.classify?.namePrimary
      - course.gradation?.namePrimary
      - course.type?.namePrimary
    types:
      course.id: String (cuid)
      course.jwId: String
      course.code: String
      course.namePrimary: String
      course.nameSecondary: String?
      course.educationLevel?.namePrimary: String?
      course.category?.namePrimary: String?
      course.classType?.namePrimary: String?
      course.classify?.namePrimary: String?
      course.gradation?.namePrimary: String?
      course.type?.namePrimary: String?
  CourseDetail:
    notes:
    - Inherits CourseSummary
    fields:
      child-sections:
      - course.sections[].jwId
      - course.sections[].code
      - course.sections[].semester?.nameCn
      - course.sections[].campus?.namePrimary
      - course.sections[].teachers[].namePrimary
      - course.sections[].stdCount
      - course.sections[].limitCount
    types:
      course.sections[].jwId: String
      course.sections[].code: String
      course.sections[].semester?.nameCn: String?
      course.sections[].campus?.namePrimary: String?
      course.sections[].teachers[].namePrimary: String[]
      course.sections[].stdCount: Int?
      course.sections[].limitCount: Int?
  SectionSummary:
    fields:
      identity:
      - section.id
      - section.jwId
      - section.code
      primary-display:
      - section.course.namePrimary
      - section.course.nameSecondary
      disambiguation:
      - section.semester?.nameCn
      - section.teachers[].namePrimary
      - section.credits
      - section.stdCount
      - section.limitCount
      - section.campus?.namePrimary
      - section.openDepartment?.namePrimary
    types:
      section.id: String (cuid)
      section.jwId: String
      section.code: String
      section.course.namePrimary: String
      section.course.nameSecondary: String?
      section.semester?.nameCn: String?
      section.teachers[].namePrimary: String[]
      section.credits: Float?
      section.stdCount: Int?
      section.limitCount: Int?
      section.campus?.namePrimary: String?
      section.openDepartment?.namePrimary: String?
  SectionDetail:
    notes:
    - Inherits SectionSummary
    fields:
      detail-extension:
      - section.examMode?.namePrimary
      - section.teachLanguage?.namePrimary
      - section.roomType?.namePrimary
      - section.adminClasses[]
      teacher-and-comment-context:
      - section.teachers[].id
      - section.teachers[].namePrimary
      - section.teachers[].department?.namePrimary
      schedule-and-exam:
      - section.schedules[]
      - section.scheduleGroups[]
      - section.exams[]
    types:
      section.examMode?.namePrimary: String?
      section.teachLanguage?.namePrimary: String?
      section.roomType?.namePrimary: String?
      section.adminClasses[]: String[]
      section.teachers[].id: String (cuid)
      section.teachers[].namePrimary: String
      section.teachers[].department?.namePrimary: String?
      section.schedules[]: ScheduleEntry[]
      section.scheduleGroups[]: ScheduleGroupEntry[]
      section.exams[]: ExamEntry[]
  TeacherSummary:
    fields:
      identity:
      - teacher.id
      - teacher.code
      primary-display:
      - teacher.namePrimary
      - teacher.nameSecondary
      auxiliary:
      - teacher.department?.namePrimary
      - teacher.teacherTitle?.namePrimary
      - teacher.email
      - teacher._count.sections
    types:
      teacher.id: String (cuid)
      teacher.code: String
      teacher.namePrimary: String
      teacher.nameSecondary: String?
      teacher.department?.namePrimary: String?
      teacher.teacherTitle?.namePrimary: String?
      teacher.email: String?
      teacher._count.sections: Int
  TeacherDetail:
    notes:
    - Inherits TeacherSummary
    fields:
      detail-extension:
      - teacher.telephone
      - teacher.mobile
      - teacher.address
      - teacher.sections[].jwId
      - teacher.sections[].code
      - teacher.sections[].course.namePrimary
      - teacher.sections[].semester?.nameCn
      - teacher.sections[].credits
    types:
      teacher.telephone: String?
      teacher.mobile: String?
      teacher.address: String?
      teacher.sections[].jwId: String
      teacher.sections[].code: String
      teacher.sections[].course.namePrimary: String
      teacher.sections[].semester?.nameCn: String?
      teacher.sections[].credits: Float?
  CalendarSubscription:
    fields:
      user-and-note:
      - subscription.userId
      - subscription.note
      section-detail:
      - subscription.sections[] uses SectionSummary
      export:
      - subscription.calendarPath
      - subscription.calendarUrl
    types:
      subscription.userId: String (cuid)
      subscription.note: String?
      subscription.sections[]: SectionSummary[]
      subscription.calendarPath: String
      subscription.calendarUrl: String
  CalendarEvent:
    fields:
      event-envelope:
      - event.type
      - event.at
      event-payload:
      - event.payload
      - event.payload shape depends on type
      event-types:
      - schedule
      - homework_due
      - exam
      - todo_due
    types:
      event.type: schedule | homework_due | exam | todo_due
      event.at: DateTime
      event.payload: ScheduleEntry | HomeworkItem | ExamEntry | TodoItem
  ScheduleEntry:
    fields:
      identity:
      - schedule.id
      - schedule.date
      - schedule.weekday
      - schedule.startTime
      - schedule.endTime
      parent-object:
      - schedule.section.jwId
      - schedule.section.code
      - schedule.section.course.namePrimary
      - schedule.section.semester?.nameCn
      location-and-teacher:
      - schedule.room?.namePrimary
      - schedule.room?.building?.namePrimary
      - schedule.room?.building?.campus?.namePrimary
      - schedule.teachers[].namePrimary
      - schedule.scheduleGroup
    types:
      schedule.id: String (cuid)
      schedule.date: Date
      schedule.weekday: Int (0=Sunday, 6=Saturday)
      schedule.startTime: String (HH:mm, Shanghai Time)
      schedule.endTime: String (HH:mm, Shanghai Time)
      schedule.section.jwId: String
      schedule.section.code: String
      schedule.section.course.namePrimary: String
      schedule.section.semester?.nameCn: String?
      schedule.room?.namePrimary: String?
      schedule.room?.building?.namePrimary: String?
      schedule.room?.building?.campus?.namePrimary: String?
      schedule.teachers[].namePrimary: String[]
      schedule.scheduleGroup: ScheduleGroupEntry?
  ScheduleGroupEntry:
    fields:
      identity:
      - scheduleGroup.id
      - scheduleGroup.jwId
      - scheduleGroup.sectionId
      group-fields:
      - scheduleGroup.no
      - scheduleGroup.limitCount
      - scheduleGroup.stdCount
      - scheduleGroup.actualPeriods
      - scheduleGroup.isDefault
      static-import-constraints:
      - When the static SQLite snapshot does not provide an official jwId, scheduleGroup.jwId uses a stable site-synthesized value.
      - For the current production static import scope (recent semesters), preserve existing synthesized values; only fall back to another stable value when full-history imports produce conflicts to ensure uniqueness.
    types:
      scheduleGroup.id: String (cuid)
      scheduleGroup.jwId: String
      scheduleGroup.sectionId: String (cuid)
      scheduleGroup.no: Int
      scheduleGroup.limitCount: Int?
      scheduleGroup.stdCount: Int?
      scheduleGroup.actualPeriods: Int
      scheduleGroup.isDefault: Boolean
  ExamEntry:
    fields:
      identity:
      - exam.id
      - exam.jwId
      - exam.examDate
      - exam.startTime
      - exam.endTime
      parent-object:
      - exam.section.jwId
      - exam.section.code
      - exam.section.course.namePrimary
      - exam.section.semester?.nameCn
      exam-info:
      - exam.examBatch
      - exam.examRooms[]
      static-import-constraints:
      - When the static SQLite snapshot does not provide an official jwId, exam.jwId uses a stable site-synthesized value.
    types:
      exam.id: String (cuid)
      exam.jwId: String
      exam.examDate: Date
      exam.startTime: String (HH:mm)
      exam.endTime: String (HH:mm)
      exam.section.jwId: String
      exam.section.code: String
      exam.section.course.namePrimary: String
      exam.section.semester?.nameCn: String?
      exam.examBatch: String?
      exam.examRooms[]: String[]
  HomeworkItem:
    fields:
      identity:
      - homework.id
      - homework.title
      timestamps:
      - homework.publishedAt
      - homework.submissionStartAt
      - homework.submissionDueAt
      - homework.createdAt
      - homework.updatedAt
      - homework.deletedAt
      parent-object:
      - homework.sectionId
      - homework.section.code
      - homework.section.course.namePrimary
      - homework.section.semester?.nameCn
      collaboration-and-personal-state:
      - homework.description?.content
      - homework.createdBy
      - homework.updatedBy
      - homework.deletedBy
      - homework.completion?.completedAt
      - homework.commentCount
    types:
      homework.id: String (cuid)
      homework.title: String
      homework.publishedAt: DateTime?
      homework.submissionStartAt: DateTime?
      homework.submissionDueAt: DateTime?
      homework.createdAt: DateTime
      homework.updatedAt: DateTime
      homework.deletedAt: DateTime?
      homework.sectionId: String (cuid)
      homework.section.code: String
      homework.section.course.namePrimary: String
      homework.section.semester?.nameCn: String?
      homework.description?.content: String?
      homework.createdBy: String (userId)
      homework.updatedBy: String?
      homework.deletedBy: String?
      homework.completion?.completedAt: DateTime?
      homework.commentCount: Int
  TodoItem:
    fields:
      identity:
      - todo.id
      - todo.title
      - todo.content
      status:
      - todo.completed
      - todo.priority
      - todo.dueAt
      - todo.createdAt
      - todo.updatedAt
    types:
      todo.id: String (cuid)
      todo.title: String
      todo.content: String?
      todo.completed: Boolean
      todo.priority: Int (0=low, 1=medium, 2=high)
      todo.dueAt: DateTime?
      todo.createdAt: DateTime
      todo.updatedAt: DateTime
  OverviewSnapshot:
    fields:
      user-info:
      - overview.user.id
      - overview.user.name
      - overview.user.image
      - overview.user.isAdmin
      counts:
      - overview.overview.pendingTodosCount
      - overview.overview.pendingHomeworksCount
      - overview.overview.todaySchedulesCount
      - overview.overview.upcomingExamsCount
      samples:
      - overview.samples.dueTodos[] uses TodoItem
      - overview.samples.dueHomeworks[] uses HomeworkItem
      - overview.samples.upcomingExams[] uses ExamEntry
    types:
      overview.user.id: String (cuid)
      overview.user.name: String?
      overview.user.image: String?
      overview.user.isAdmin: Boolean
      overview.overview.pendingTodosCount: Int
      overview.overview.pendingHomeworksCount: Int
      overview.overview.todaySchedulesCount: Int
      overview.overview.upcomingExamsCount: Int
      overview.samples.dueTodos[]: TodoItem[]
      overview.samples.dueHomeworks[]: HomeworkItem[]
      overview.samples.upcomingExams[]: ExamEntry[]
ui:
  List Table: |-
    * Used for discovery-type lists such as courses, sections, and teachers.
    * Primary display information is placed in the first visual column.
    * Structured fields serve disambiguation and comparison.
    * Rows are fully clickable and navigate to the detail page.
  Detail Hero: |-
    * Used at the top of course, section, and teacher detail pages.
    * Contains breadcrumb, h1, and an optional subtitle.
    * h1 uses the primary display name of the current object, not an internal ID.
  Basic Info Card: |-
    * Used in detail page sidebars or collapsible panels.
    * Displays structured fields; does not carry comment or homework interactions.
  Context Tabs: |-
    * Used for multi-context switching within detail pages.
    * Common combinations: sections — homework, calendar, comments; courses — sections, comments; teachers — sections, comments.
  Calendar Export Dialog: |-
    * Used to display single-object iCal and personal subscription iCal.
    * Presented as a copyable link; users are not required to manually construct the URL.
modules:
  user:
    name: User
    access:
      anon: Can browse all public information; further actions are not available before entering the sign-in flow.
      user: Can follow sections, manage todos, mark homework completion, export iCal, pin frequent links, save bus preferences, post comments/replies/reactions and upload attachments, and manage personal profile and OAuth connections.
      admin: Can review comments, maintain descriptions, manage users, suspend accounts, manage OAuth clients, maintain bus data, and handle user content and platform security issues.
      agent: Can only access restricted capabilities after OAuth authorization; does not inherit admin permissions by default; REST and MCP for the same abstract endpoint maintain consistent fields and permissions.
    rules:
      sign-in-providers: Sign-in supports USTC, GitHub, and Google OAuth; custom username/password login is not considered due to security and maintenance cost.
      oauth-callback-integrity: On a canonical same-origin deployment, OAuth login callbacks must complete state validation and session creation directly, without losing state due to proxy wrapping or container-internal host differences.
      welcome-flow-required: New users who have not set a name or username on first login must complete the welcome flow before proceeding.
      auth-callback-not-intercepted: Authorization callback continuation requests carrying OAuth code/error and state must be allowed to complete the protocol redirect; the welcome page interceptor must not break the authorization result redirect.
      post-login-redirect: After successful login, the user should be redirected back to the originally requested page whenever possible; if no origin page exists, redirect to the home page.
      public-identity-display: Public identity defaults to displaying name or username, not internal identifiers.
    capabilities:
      sign-in:
        title: Sign In
        auth: anon
        web:
          status: stable
          pages:
          - /signin
          notes:
          - Centrally displays OAuth sign-in entries.
        rest:
          status: stable
          notes:
          - Authentication routes handle sign-in and session creation.
        mcp:
          status: unavailable
          notes:
          - Does not provide sign-in capabilities.
      first-login-welcome:
        title: First Login & Welcome Page
        auth: user
        web:
          status: stable
          pages:
          - /welcome
          notes:
          - The welcome page only handles completing profile information and does not mix in other personalization settings.
          - Usernames must remain short and publicly displayable.
        rest:
          status: unavailable
          notes:
          - No separate welcome page write endpoint is currently exposed.
        mcp:
          status: unavailable
          notes:
          - No corresponding write capability is provided.
      post-login-redirect:
        title: Post-Login Redirect
        auth: anon
        web:
          status: stable
          notes:
          - After successful login, redirect back to the originally requested page whenever possible.
          - Return to the home page when no specific origin page exists.
        rest:
          status: unavailable
          notes:
          - No separate post-login redirect endpoint currently exists.
      public-profile:
        title: Public Profile
        auth: anon
        web:
          status: stable
          pages:
          - /u/$username
          - /u/id/$uid
          notes:
          - /u/id/$uid is an exception entry that can additionally display the user ID.
          - The regular public profile displays avatar, nickname or name, @username, and join date.
          - The contribution overview displays the number of followed sections, comments, uploads, created homework items, and a contribution graph for the past year.
        rest:
          status: stable
          routes:
          - path: /api/me
            method: GET
            returns: "{ id, email, name, image, username, isAdmin }"
            auth: user
            notes:
            - Returns the authenticated user's core profile fields only; no separate public profile endpoint for other users is currently exposed.
        mcp:
          status: stable
          tools:
          - name: get_my_profile
            auth: user
            returns: "{ id, email, name, image, username, isAdmin }"
            rest_equivalent: GET /api/me
          - name: get_public_user_profile
            status: unavailable
            auth: anon
      settings:
        title: Settings
        auth: user
        web:
          status: stable
          pages:
          - /settings?tab=profile
          - /settings?tab=accounts
          - /settings?tab=content
          - /settings?tab=danger
          notes:
          - "profile: Edit name, username, and avatar."
          - "accounts: View and manage connected OAuth accounts; disconnecting an account is a destructive action that must display a confirmation dialog first; attempting to disconnect the last sign-in account must result in an error."
          - "content: Explains that uploads and comments are object-attached content; no standalone 'my comments / my uploads' settings page; currently provides a next-step entry point to section browsing and the comment guide."
          - "danger: Delete account; deletion is a high-risk operation requiring the user to enter the fixed confirmation word DELETE."
          - The settings page currently only uses the ?tab= query parameter as a stable entry point; alias paths such as /settings/profile, /settings/accounts, /settings/content, /settings/danger, /settings/comments, and /settings/uploads are no longer provided.
        rest:
          status: unavailable
          notes:
          - No separate settings center aggregation endpoint currently exists.
        mcp:
          status: unavailable
          notes:
          - No account connection management or account deletion capability is provided.
  semester:
    name: Semester
    access:
      anon: Can read semester information.
      user: Can read semester information. Cannot modify semester data.
      admin: Can read semester information. Does not directly modify semester facts through ordinary pages.
      agent: Can only read existing semester information; no additional write permissions.
    rules:
      organizational-dimension: Semesters are the organizational dimension for courses, sections, schedules, and exams.
      current-semester-by-rules: The current semester must be determined by explicit business rules, not by rough natural-year inference.
      semester-visible-in-filters: Semesters should be clearly visible in filters, group headings, detail basic info, and cross-semester browsing.
    capabilities:
      semester-list:
        title: Semester List
        auth: anon
        links:
          models:
          - name: SemesterSummary
            role: primary
        web:
          status: stable
          notes:
          - Courses, sections, home page, and filter contexts consume semester.nameCn and semester.id.
          - Semester appears in this project as an actual display and disambiguation field.
        rest:
          status: stable
          routes:
          - path: /api/semesters
            method: GET
            returns: "PaginatedResponse<SemesterSummary>"
            auth: anon
        mcp:
          status: stable
          tools:
          - name: list_semesters
            auth: anon
            returns: "PaginatedResponse<SemesterSummary>"
            rest_equivalent: GET /api/semesters
      current-semester:
        title: Current Semester
        auth: anon
        links:
          models:
          - name: SemesterSummary
            role: primary
        rules:
          latest-startdate-wins: The current semester is determined by date range; when multiple semester ranges overlap the current date, the semester with the latest startDate is selected to prevent an older range or import residue from shadowing a more specific newer semester.
        web:
          status: stable
          notes:
          - The home page and calendar logic consume the current semester object; no separate 'current semester detail page' is shown.
        rest:
          status: stable
          routes:
          - path: /api/semesters/current
            method: GET
            returns: "SemesterSummary | null"
            auth: anon
            notes:
            - Returns a single SemesterSummary or 404.
        mcp:
          status: stable
          tools:
          - name: get_current_semester
            auth: anon
            returns: "{ found: Boolean, semester: SemesterSummary? }"
            rest_equivalent: GET /api/semesters/current
  course:
    name: Course
    access:
      anon: Can browse course information.
      user: Can browse course information. Cannot modify course fact data.
      admin: Can browse course information. Does not directly modify course facts through ordinary pages.
      agent: Can read course search and detail capabilities.
    rules:
      stable-entity: A course is a stable course entity and does not represent a specific semester offering.
      jwid-url-only: jwId is used only for URLs, APIs, MCP, and backend logic; it should not be directly displayed in ordinary course UI.
    capabilities:
      course-list:
        title: Course List & Filter
        auth: anon
        links:
          models:
          - name: CourseSummary
            role: primary
          ui:
          - List Table
        web:
          status: stable
          pages:
          - /courses
          notes:
          - The first visual column uses course.namePrimary; the secondary line uses course.nameSecondary.
          - Structured columns display course.code, course.educationLevel?.namePrimary, course.category?.namePrimary, course.classType?.namePrimary.
          - Supports searching by course name, English name, and course code.
          - Supports filtering by category, level, and type.
        rest:
          status: stable
          routes:
          - path: /api/courses
            method: GET
            returns: "PaginatedResponse<CourseSummary>"
            auth: anon
        mcp:
          status: stable
          tools:
          - name: search_courses
            auth: anon
            returns: "CourseSummary[]"
            rest_equivalent: GET /api/courses
      course-detail:
        title: Course Detail
        auth: anon
        links:
          models:
          - name: CourseDetail
            role: primary
          ui:
          - Detail Hero
          - Context Tabs
          - Basic Info Card
        web:
          status: stable
          pages:
          - /courses/[jwId]
          notes:
          - h1 uses course.namePrimary; subtitle uses course.nameSecondary.
          - Breadcrumb current item displays course.code.
          - Basic info card shows course.code, course.educationLevel?.namePrimary, course.category?.namePrimary, course.classType?.namePrimary.
          - Child sections table shows course.sections[].semester?.nameCn, course.sections[].code, course.sections[].teachers[].namePrimary, course.sections[].campus?.namePrimary, course.sections[].stdCount, course.sections[].limitCount.
          - Comments and description are present in the detail page context.
        rest:
          status: stable
          routes:
          - path: /api/courses/[jwId]
            method: GET
            returns: "CourseDetail"
            auth: anon
        mcp:
          status: stable
          tools:
          - name: get_course_by_jw_id
            auth: anon
            returns: "{ found: Boolean, course: CourseDetail? }"
            rest_equivalent: GET /api/courses/[jwId]
  section:
    name: Section
    access:
      anon: Can browse public section information.
      user: Can perform subscription, homework, comment, and description collaborative actions around sections, but cannot modify section fact data.
      admin: Does not directly modify academic section facts through ordinary pages.
      agent: Can read section information and manage personal section-related state through OAuth-authorized REST / MCP endpoints.
    rules:
      semester-offering: A section is a specific teaching class for a course in a given semester.
      subscription-not-enrollment: Pages involving subscription actions must clearly state this is not official academic course enrollment.
      jwid-url-only: jwId is used only for routing and API endpoints; it should not be directly displayed in ordinary section UI.
    capabilities:
      section-list:
        title: Section List & Filter
        auth: anon
        links:
          models:
          - name: SectionSummary
            role: primary
          ui:
          - List Table
        web:
          status: stable
          pages:
          - /sections
          notes:
          - In this project, the primary display field for section lists is not a standalone section.name but section.course.namePrimary.
          - Structured columns display section.semester?.nameCn, section.code, section.teachers[].namePrimary, section.credits, section.stdCount, section.limitCount, section.campus?.namePrimary.
          - Supports search, semester filter, clear filter, and navigation to detail.
        rest:
          status: stable
          routes:
          - path: /api/sections
            method: GET
            returns: "PaginatedResponse<SectionSummary>"
            auth: anon
        mcp:
          status: stable
          tools:
          - name: search_sections
            auth: anon
            returns: "PaginatedResponse<SectionSummary>"
            rest_equivalent: GET /api/sections
      section-detail:
        title: Section Detail
        auth: anon
        links:
          models:
          - name: SectionDetail
            role: primary
          ui:
          - Detail Hero
          - Context Tabs
          - Basic Info Card
        web:
          status: stable
          pages:
          - /sections/[jwId]
          notes:
          - h1 uses section.course.namePrimary, not a standalone section.name.
          - Subtitle displays section.course.nameSecondary and a 'not official enrollment' reminder.
          - Breadcrumb current item displays section.code.
          - Basic info area shows section.semester?.nameCn, section.code, section.campus?.namePrimary, section.credits, section.teachLanguage?.namePrimary, section.examMode?.namePrimary, section.openDepartment?.namePrimary.
          - "The main content area uses three context tabs: homework, calendar, and comments."
          - The sidebar displays description, basic info, other teaching sections, and a mini calendar.
        rest:
          status: stable
          routes:
          - path: /api/sections/[jwId]
            method: GET
            returns: "SectionDetail"
            auth: anon
        mcp:
          status: stable
          tools:
          - name: get_section_by_jw_id
            auth: anon
            returns: "{ found: Boolean, section: SectionDetail? }"
            rest_equivalent: GET /api/sections/[jwId]
      section-ical:
        title: Section iCal Export
        auth: anon
        links:
          ui:
          - Calendar Export Dialog
        web:
          status: stable
          notes:
          - The calendar entry on the section detail page provides a single-section iCal.
        rest:
          status: stable
          routes:
          - path: /api/sections/[jwId]/calendar.ics
            method: GET
            returns: text/calendar
            auth: anon
            notes:
            - Returns text/calendar; content is derived from the section's schedule and exams.
        mcp:
          status: stable
          tools:
          - name: get_section_calendar_subscription
            auth: anon
            returns: "{ icalUrl: String, note: String }"
            rest_equivalent: GET /api/sections/[jwId]/calendar.ics
            notes:
            - Returns a single-section iCal link and usage instructions.
  teacher:
    name: Teacher
    access:
      anon: Can browse teacher information.
      user: Can browse teacher information. Cannot modify teacher fact data.
      admin: Can browse teacher information. Does not directly modify teacher facts through ordinary pages.
      agent: Can directly read teacher lists and details; also indirectly consumes teacher information in course and section results.
    rules:
      identified-by-name: Teacher objects are naturally identified by name.
      section-code-auxiliary: Section codes retain value on teacher pages but appear only as auxiliary fields in the teaching section list.
    capabilities:
      teacher-list:
        title: Teacher List & Filter
        auth: anon
        links:
          models:
          - name: TeacherSummary
            role: primary
          ui:
          - List Table
        web:
          status: stable
          pages:
          - /teachers
          notes:
          - The first visual column uses teacher.namePrimary; in English contexts, teacher.nameSecondary can be appended.
          - Structured columns display teacher.department?.namePrimary, teacher.teacherTitle?.namePrimary, teacher.email, teacher._count.sections.
          - Supports searching by name, English name, and teacher code.
          - Supports department filtering and pagination.
        rest:
          status: stable
          routes:
          - path: /api/teachers
            method: GET
            returns: "PaginatedResponse<TeacherSummary>"
            auth: anon
        mcp:
          status: stable
          tools:
          - name: search_teachers
            auth: anon
            returns: "PaginatedResponse<TeacherSummary>"
            rest_equivalent: GET /api/teachers
      teacher-detail:
        title: Teacher Detail
        auth: anon
        links:
          models:
          - name: TeacherDetail
            role: primary
          ui:
          - Detail Hero
          - Context Tabs
          - Basic Info Card
        web:
          status: stable
          pages:
          - /teachers/[id]
          notes:
          - h1 uses teacher.namePrimary; in English contexts, teacher.nameSecondary can be appended.
          - Basic info area shows teacher.department?.namePrimary, teacher.teacherTitle?.namePrimary, teacher.email, teacher.telephone, teacher.mobile, teacher.address.
          - Related sections table shows teacher.sections[].semester?.nameCn, teacher.sections[].course.namePrimary, teacher.sections[].code, teacher.sections[].credits.
          - Comments and description are present in the detail page context.
        rest:
          status: stable
          routes:
          - path: /api/teachers/[id]
            method: GET
            returns: "TeacherDetail"
            auth: anon
        mcp:
          status: stable
          tools:
          - name: get_teacher_by_id
            auth: anon
            returns: "{ found: Boolean, teacher: TeacherDetail? }"
            rest_equivalent: GET /api/teachers/[id]
  subscription:
    name: Subscription
    access:
      anon: Can see the subscription entry but cannot directly create a subscription.
      user: Can only manage their own section subscription relationships.
      admin: Does not manage personal subscriptions on behalf of users through ordinary pages.
      agent: After OAuth authorization, can manage the current user's own subscription relationships; REST and MCP both support the same semantic operations.
    rules:
      subscription-language: Copy may use 'subscribe to section' or 'follow section'; must not write 'enroll in course'.
      user-scoped: Subscription relationships belong only to the current user and determine the display scope for home page, calendar, homework, and exam.
    capabilities:
      subscribe-from-section:
        title: Subscribe from Section Detail
        auth: user
        links:
          models:
          - name: CalendarSubscription
            role: primary
          ui:
          - Detail Hero
        web:
          status: stable
          pages:
          - /sections/[jwId]
          notes:
          - The individual subscribe/unsubscribe action on the section detail page is a lightweight personal state toggle that takes effect immediately without a confirmation dialog.
        rest:
          status: unavailable
          notes:
          - No separate 'single subscribe / unsubscribe' REST route currently exists.
          - Page behavior is handled through server actions; results are converged to the current user's subscription state.
        mcp:
          status: stable
          tools:
          - name: subscribe_section_by_jw_id
            auth: user
            returns: "{ success: Boolean, subscription: CalendarSubscription }"
          - name: unsubscribe_section_by_jw_id
            auth: user
            returns: "{ success: Boolean, subscription: CalendarSubscription }"
      batch-subscribe-by-codes:
        title: Batch Subscribe by Course Codes
        auth: user
        links:
          models:
          - name: SectionSummary
            role: context
          - name: CalendarSubscription
            role: primary
        web:
          status: stable
          pages:
          - /?tab=subscriptions
          notes:
          - Home page empty state.
          - Batch import results must distinguish between successful items, failed items, and items awaiting confirmation.
          - Subscription relationships are created only after user confirmation.
        rest:
          status: stable
          routes:
          - path: /api/sections/match-codes
            method: POST
            returns: "{ semester: SemesterSummary, matchedCodes: String[], unmatchedCodes: String[], sections: SectionSummary[] }"
            auth: user
          - path: /api/calendar-subscriptions
            method: POST
            returns: "{ subscription: CalendarSubscription }"
            auth: user
            notes:
            - subscription.sections[] is the user's new set of subscribed sections.
        mcp:
          status: stable
          tools:
          - name: match_section_codes
            auth: user
            returns: "{ semester: SemesterSummary, matchedCodes: String[], unmatchedCodes: String[], sections: SectionSummary[] }"
            rest_equivalent: POST /api/sections/match-codes
          - name: subscribe_my_sections_by_codes
            auth: user
            returns: "{ matchedCodes: String[], unmatchedCodes: String[], addedCount: Int, subscription: CalendarSubscription }"
            rest_equivalent: POST /api/calendar-subscriptions
  ical:
    name: Personal Calendar Subscription iCal
    access:
      anon: Can copy a single-section iCal link from the public section detail page.
      user: Can copy their own personal subscription iCal link.
      admin: No additional exclusive iCal capabilities.
      agent: After authorization, can read the current user's personal calendar subscription information; REST and MCP should both return the same subscription feed information and description.
    rules:
      copyable-links: iCal links should be presented as copyable links rather than requiring users to manually construct them.
      no-second-model: iCal is an export / subscription capability and should not carry a second business model.
      static-json-resilient: Calendar location and building image enhancements only read static JSON published at https://static.life-ustc.tiankaima.dev; when loading fails or data is corrupted, diagnostic information should be logged and a valid iCal should still be returned.
    capabilities:
      section-calendar-dialog:
        title: Section Calendar Dialog
        auth: anon
        links:
          ui:
          - Calendar Export Dialog
        web:
          status: stable
          pages:
          - /sections/[jwId]
          notes:
          - Exposes both single-section iCal and personal subscription iCal simultaneously; the latter requires sign-in.
        rest:
          status: stable
          routes:
          - path: /api/sections/[jwId]/calendar.ics
            method: GET
            returns: text/calendar
            auth: anon
            notes:
            - Returns text/calendar synthesized from the section's schedule and exams.
      personal-calendar-subscription:
        title: Personal Calendar Subscription
        auth: user
        links:
          models:
          - name: CalendarSubscription
            role: primary
          ui:
          - Calendar Export Dialog
        web:
          status: stable
          pages:
          - /?tab=calendar
          notes:
          - Displays the personal subscription URL as a copyable link.
        rest:
          status: stable
          routes:
          - path: /api/users/[userId]/calendar.ics
            method: GET
            returns: text/calendar
            auth: user
          - path: /api/calendar-subscriptions/current
            method: GET
            returns: "CalendarSubscription"
            auth: user
            notes:
            - Returns subscribed section details, personal calendar feed path, full feed URL, and descriptive text.
        mcp:
          status: stable
          tools:
          - name: get_my_calendar_subscription
            auth: user
            returns: "CalendarSubscription"
            rest_equivalent: GET /api/calendar-subscriptions/current
      multi-section-ical:
        title: Multi-Section iCal Export
        auth: anon
        web:
          status: unavailable
          notes:
          - No stable standalone page entry currently exists; this capability is more like a lower-level export endpoint.
        rest:
          status: stable
          routes:
          - path: /api/sections/calendar.ics
            method: GET
            returns: text/calendar
            auth: anon
            notes:
            - Generates a multi-section iCal based on sectionIds query parameter.
  subscribed-sections:
    name: Subscribed Sections
    access:
      anon: Cannot view their own subscribed sections list.
      user: Can only view and manage their own subscribed sections list.
      admin: Does not view or edit other users' subscription lists through ordinary pages.
      agent: Can read and manage the subscribed sections list data with the same semantics as the web through REST and MCP.
    rules:
      grouped-by-semester: The list is grouped by semester rather than presented as a single flat list.
      section-codes-promoted: In the 'subscribed context', users manage specific section relationships, so section codes are intentionally promoted.
    capabilities:
      subscribed-sections-tab:
        title: Subscribed Sections Tab
        auth: user
        links:
          models:
          - name: CalendarSubscription
            role: primary
          - name: SectionSummary
            role: context
          ui:
          - List Table
        web:
          status: stable
          pages:
          - /?tab=subscriptions
          notes:
          - A section table grouped by semester.
          - Inline fields currently retain section code, course name, teacher, and credits.
          - The empty state provides entries for searching sections, browsing courses, and batch import.
          - The unsubscribe action uses a lightweight two-step armed button rather than a modal confirmation dialog.
        rest:
          status: stable
          routes:
          - path: /api/calendar-subscriptions/current
            method: GET
            returns: "CalendarSubscription"
            auth: user
            notes:
            - Returns the current user's subscribed section details and personal subscription feed information; supports the subscribed sections list and personal calendar subscription entry.
        mcp:
          status: stable
          tools:
          - name: list_my_subscribed_sections
            auth: user
            returns: "{ sections: SectionSummary[], note: String? }"
            rest_equivalent: GET /api/calendar-subscriptions/current
          - name: get_my_calendar_subscription
            auth: user
            returns: "CalendarSubscription"
            rest_equivalent: GET /api/calendar-subscriptions/current
            notes:
            - Supplements calendarPath and calendarUrl on the same abstract entry.
  schedule:
    name: Schedule
    access:
      anon: Can read public schedule information.
      user: Can read public schedule information. Cannot modify schedule fact data.
      admin: Can read public schedule information. Does not directly modify schedule facts through ordinary pages.
      agent: Can read schedules for specific sections; current-user schedule aggregation is primarily exposed via MCP; public schedule retrieval is available through REST and MCP.
    rules:
      schedule-definition: Schedule refers to a section's class times, locations, and week patterns.
      schedule-as-context: The schedule within a section detail page is not treated as an isolated table but as an important entry point for understanding the section context.
      personal-calendar-integrates: The personal calendar integrates subscribed section schedules, homework due dates, exam times, and personal todo due dates.
    capabilities:
      my-schedule:
        title: My Schedule
        auth: user
        links:
          models:
          - name: ScheduleEntry
            role: primary
        web:
          status: stable
          pages:
          - /?tab=calendar
          notes:
          - The home page calendar consumes schedule data from subscribed sections.
        rest:
          status: unavailable
          notes:
          - No separate 'current user schedule' REST aggregation endpoint currently exists.
        mcp:
          status: stable
          tools:
          - name: list_my_schedules
            auth: user
            returns: "ScheduleEntry[]"
            notes:
            - Returns schedules[]; each item contains date, weekday, startTime, endTime, section.course.namePrimary, section.code, room, teachers[], and scheduleGroup.
      public-schedule-query:
        title: Public Schedule Query
        auth: anon
        links:
          models:
          - name: ScheduleEntry
            role: primary
        web:
          status: unavailable
          notes:
          - No standalone public schedule page currently calls this endpoint directly; pages assemble data more through server-side queries.
        rest:
          status: stable
          routes:
          - path: /api/schedules
            method: GET
            returns: "PaginatedResponse<ScheduleEntry>"
            auth: anon
            notes:
            - Supports filtering by section, teacher, room, date range, and day of week.
        mcp:
          status: stable
          tools:
          - name: query_schedules
            auth: anon
            returns: "PaginatedResponse<ScheduleEntry>"
            rest_equivalent: GET /api/schedules
      section-schedule:
        title: Section Schedule
        auth: anon
        links:
          models:
          - name: ScheduleEntry
            role: primary
        web:
          status: stable
          pages:
          - /sections/[jwId]
          notes:
          - The calendar tab on the section detail page consumes the section's schedule and exam data.
        rest:
          status: stable
          routes:
          - path: /api/sections/[jwId]/schedules
            method: GET
            returns: "ScheduleEntry[]"
            auth: anon
            notes:
            - Returns a simplified variant of ScheduleEntry[] for the section.
          - path: /api/sections/[jwId]/schedule-groups
            method: GET
            returns: "ScheduleGroupEntry[]"
            auth: anon
            notes:
            - Returns period information aggregated by group.
        mcp:
          status: stable
          tools:
          - name: list_schedules_by_section
            auth: anon
            returns: "ScheduleEntry[]"
            rest_equivalent: GET /api/sections/[jwId]/schedules
          - name: get_my_7days_timeline
            auth: user
            returns: "CalendarEvent[]"
            notes:
            - Returns schedules as the schedule type within a unified event stream.
  calendar:
    name: Calendar
    access:
      anon: Can browse calendar information on public section detail pages.
      user: Can browse the personal calendar view.
      admin: Has no special calendar view separate from regular users.
      agent: Can read timeline information with the same semantics through OAuth REST and MCP.
    rules:
      views: Currently provides semester, month, and week views simultaneously.
      week-starts-sunday: The week view starts on Sunday.
      event-card-types: Calendar event cards uniformly carry course, exam, homework, and todo events.
    capabilities:
      personal-calendar-view:
        title: Personal Calendar View
        auth: user
        links:
          models:
          - name: CalendarEvent
            role: primary
          - name: ScheduleEntry
            role: context
          - name: HomeworkItem
            role: context
          - name: ExamEntry
            role: context
          - name: TodoItem
            role: context
        web:
          status: stable
          pages:
          - /?tab=calendar
          notes:
          - Provides semester view, month view, and week view.
        rest:
          status: unavailable
          notes:
          - No separate unified calendar aggregation endpoint currently exists.
        mcp:
          status: stable
          tools:
          - name: list_my_calendar_events
            auth: user
            returns: "CalendarEvent[]"
            notes:
            - Returns course, exam, homework, and todo events unified by date range, directly corresponding to the personal calendar view.
            - Each item in events[] has type, at, and payload; payload corresponds to ScheduleEntry, HomeworkItem, ExamEntry, or TodoItem based on type.
          - name: get_my_7days_timeline
            auth: user
            returns: "CalendarEvent[]"
          - name: list_my_schedules
            auth: user
            returns: "ScheduleEntry[]"
          - name: list_my_exams
            auth: user
            returns: "ExamEntry[]"
      section-calendar-view:
        title: Section Calendar View
        auth: anon
        links:
          ui:
          - Context Tabs
        web:
          status: stable
          pages:
          - /sections/[jwId]
          notes:
          - The current implementation merges schedule and exams in the same calendar tab rather than splitting them into a separate exam tab.
        rest:
          status: stable
          notes:
          - Currently supported through a combination of schedule, exam, and iCal endpoints.
      event-card:
        title: Event Card
        auth: anon
        web:
          status: stable
          notes:
          - Compact cards prioritize displaying title and time.
          - Location is not expanded in the second row by default; location, teacher, exam batch, and other details appear in a popover / details.
          - Cards can navigate to the related section, homework, exam, or home page tab.
          - The home page calendar and section calendar reuse the same card, hover/popover, and navigation behavior as much as possible.
        rest:
          status: unavailable
          notes:
          - Does not directly expose the 'card' concept; only exposes structured event data.
        mcp:
          status: unavailable
          notes:
          - Does not directly expose the 'card' concept; only exposes structured results.
  homework:
    name: Homework
    access:
      anon: Can read homework information under public sections, but cannot create, update, or delete.
      user: When signed in and not suspended, can create and update homework; delete permission is limited to the creator and admins; each user can only manage their own homework completion state.
      admin: Can delete homework and participate in governance.
      agent: After authorization, can read, create, and update homework and set the current user's completion state; both REST and MCP currently provide this capability.
    rules:
      attached-to-section: Homework is attached to a section, not a personal user todo.
      no-subscription-required: Creating homework does not require the user to be subscribed to the section first.
      entity-and-completion-separated: Homework entity and homework completion state are strictly separated to prevent 'I completed it' from becoming 'the homework was modified'.
    capabilities:
      cross-section-homework-summary:
        title: Cross-Section Homework Summary
        auth: user
        links:
          models:
          - name: HomeworkItem
            role: primary
        web:
          status: stable
          pages:
          - /?tab=homeworks
          notes:
          - The homework summary page handles scanning across sections.
          - Homework cards prioritize displaying due date, title, and course name.
          - Section codes and internal IDs do not enter the main display area by default.
        rest:
          status: unavailable
          notes:
          - No separate 'current user cross-section homework summary' REST endpoint currently exists.
        mcp:
          status: stable
          tools:
          - name: list_my_homeworks
            auth: user
            returns: "HomeworkItem[]"
            notes:
            - Returns homeworks[]; each item contains title, submissionDueAt, section.course.namePrimary, section.code, description, and completion.
      section-homework-tab:
        title: Section Homework Tab
        auth: anon
        links:
          models:
          - name: HomeworkItem
            role: primary
          ui:
          - Context Tabs
        web:
          status: stable
          pages:
          - /sections/[jwId]
          notes:
          - Provides full entries for create, edit, delete, and description maintenance.
          - Deleting homework is a high-risk operation that requires confirmation.
          - Homework description is maintained alongside the homework entity; at minimum the last update time is retained.
        rest:
          status: stable
          routes:
          - path: /api/homeworks
            method: GET
            returns: "{ viewer: String, homeworks: HomeworkItem[], auditLogs: AuditLog[] }"
            auth: anon
          - path: /api/homeworks
            method: POST
            returns: "{ id: String }"
            auth: user
          - path: /api/homeworks/[id]
            method: PATCH
            returns: "HomeworkItem"
            auth: user
          - path: /api/homeworks/[id]
            method: DELETE
            returns: "{ success: Boolean }"
            auth: user
        mcp:
          status: stable
          tools:
          - name: list_homeworks_by_section
            auth: anon
            returns: "HomeworkItem[]"
            rest_equivalent: GET /api/homeworks
          - name: create_homework_on_section
            auth: user
            returns: "{ id: String }"
            rest_equivalent: POST /api/homeworks
          - name: update_homework_on_section
            auth: user
            returns: "HomeworkItem"
            rest_equivalent: PATCH /api/homeworks/[id]
      homework-governance:
        title: Homework Governance
        auth: admin
        web:
          status: stable
          notes:
          - No standalone homework governance page currently exists; admin deletion is handled through governance endpoints.
        rest:
          status: stable
          routes:
          - path: /api/admin/homeworks
            method: GET
            returns: "HomeworkItem[]"
            auth: admin
          - path: /api/admin/homeworks/[id]
            method: DELETE
            returns: "{ success: Boolean }"
            auth: admin
        mcp:
          status: unavailable
          notes:
          - No admin homework tools are currently provided.
      homework-completion:
        title: Homework Completion
        auth: user
        links:
          models:
          - name: HomeworkItem
            role: context
        web:
          status: stable
          notes:
          - The home page, homework summary page, and section detail all support toggling the current user's completion state.
        rest:
          status: stable
          routes:
          - path: /api/homeworks/[id]/completion
            method: POST
            returns: "{ completed: Boolean, completedAt: DateTime? }"
            auth: user
        mcp:
          status: stable
          tools:
          - name: set_my_homework_completion
            auth: user
            returns: "{ homeworkId: String, completed: Boolean, completedAt: DateTime? }"
            rest_equivalent: POST /api/homeworks/[id]/completion
  todo:
    name: Todo
    access:
      anon: Cannot read or write personal todos.
      user: Can only manage their own todos.
      admin: Has no ordinary page capability to independently manage other users' todos.
      agent: After authorization, can only read and write the current user's own todos; both REST and MCP currently provide this capability.
    rules:
      purely-personal: Todo is a purely personal object and is not bound to any section.
      due-date-calendar: Only incomplete todos with a due date appear in the calendar.
      completed-retained: Completed todos retain history but no longer occupy urgent information areas.
    capabilities:
      todo-list:
        title: Todo List & Filter
        auth: user
        links:
          models:
          - name: TodoItem
            role: primary
        web:
          status: stable
          pages:
          - /?tab=todos
          notes:
          - Filter dimensions include all, incomplete, and completed.
          - Cards primarily display todo title; secondary display shows priority and due date.
        rest:
          status: stable
          routes:
          - path: /api/todos
            method: GET
            returns: "TodoItem[]"
            auth: user
            notes:
            - Returns todos[]; each item contains id, title, content, completed, priority, dueAt, createdAt, and updatedAt.
        mcp:
          status: stable
          tools:
          - name: list_my_todos
            auth: user
            returns: "TodoItem[]"
            rest_equivalent: GET /api/todos
      todo-edit:
        title: Todo Edit Sheet
        auth: user
        links:
          models:
          - name: TodoItem
            role: primary
        web:
          status: stable
          pages:
          - /?tab=todos
          - /?tab=overview
          notes:
          - Todos are created and edited through a Sheet panel.
          - Deleting a todo currently does not use a destructive confirm dialog.
        rest:
          status: stable
          routes:
          - path: /api/todos
            method: POST
            returns: "{ id: String }"
            auth: user
          - path: /api/todos/[id]
            method: PATCH
            returns: "TodoItem"
            auth: user
          - path: /api/todos/[id]
            method: DELETE
            returns: "{ success: Boolean }"
            auth: user
        mcp:
          status: stable
          tools:
          - name: create_my_todo
            auth: user
            returns: "{ success: Boolean, id: String }"
            rest_equivalent: POST /api/todos
          - name: update_my_todo
            auth: user
            returns: "{ success: Boolean }"
            rest_equivalent: PATCH /api/todos/[id]
          - name: delete_my_todo
