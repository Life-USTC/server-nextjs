  subscription:
    name: Subscription
    access:
      anon: Can see the subscription entry but cannot directly create a subscription.
      user: Can only manage their own section subscription relationships.
      admin: Does not manage personal subscriptions on behalf of users through ordinary pages.
      agent: After OAuth authorization, can manage the current user's own subscription relationships; REST and MCP both support the same semantic operations.
    rules:
      subscription-language: Copy may use 'subscribe to section' or 'follow section'; must not write 'enroll in course'.
      user-scoped: Subscription relationships belong only to the current user and determine the display scope for home page, calendar, homework, and exam.
    capabilities:
      subscribe-from-section:
        title: Subscribe from Section Detail
        auth: user
        links:
          models:
            - User
            - Section
          ui:
            - Detail Hero
        web:
          pages:
            - /sections/[jwId]
        rest: unavailable
        mcp:
          tools:
            - name: subscribe_section_by_jw_id
              returns: "{ success: Boolean, action: String, sectionJwId: Int, subscription }"
              notes:
                - Default/summary responses return a compact subscription update result instead of the full subscribed section list.
                - Request full mode only when the caller explicitly needs the full CalendarSubscription with sections[].
            - name: unsubscribe_section_by_jw_id
              returns: "{ success: Boolean, action: String, sectionJwId: Int, subscription }"
              notes:
                - Default/summary responses return a compact subscription update result instead of the full subscribed section list.
                - Request full mode only when the caller explicitly needs the full CalendarSubscription with sections[].
        display:
          fields:
            - Subscribe/unsubscribe icon button state
            - Subscription disclaimer copy
      batch-subscribe-by-codes:
        title: Batch Subscribe by Course Codes
        auth: user
        links:
          models:
            - Section
            - User
        web:
          pages:
            - /?tab=subscriptions
        rest:
          routes:
            - path: /api/sections/match-codes
              method: POST
              returns: "{ semester: Semester, matchedCodes: String[], unmatchedCodes: String[], sections: Section[], total: Int }"
            - path: /api/calendar-subscriptions
              method: POST
              returns: "{ subscription: CalendarSubscription }"
              notes:
                - subscription.sections[] is the user's new set of subscribed sections.
        mcp:
          tools:
            - name: match_section_codes
              returns: "{ semester: Semester, matchedCodes: String[], unmatchedCodes: String[], suggestions?: Record<String, String[]>, sections: Section[], total: Int }"
              rest_equivalent: POST /api/sections/match-codes
              notes:
                - Returns suggestions for unmatched inputs when close section codes in the selected semester share a strong code-prefix or edit-distance match; unrelated section codes should be filtered out.
                - Prefer this read-only preview before subscribe_my_sections_by_codes when the caller needs confirmation or typo recovery.
            - name: subscribe_my_sections_by_codes
              returns: "{ success: Boolean, semester, matchedCodes, unmatchedCodes, addedCount, alreadySubscribedCount, subscription }"
              rest_equivalent: POST /api/calendar-subscriptions
              notes:
                - Convenience mutation that combines matching with subscription update.
                - Use match_section_codes first when the caller needs a dry-run style preview.
                - Default/summary responses return the subscription totals plus feed link information, not the entire subscribed section list.
                - Request full mode only when the caller explicitly needs the full CalendarSubscription with sections[].
        display:
          fields:
            - Course/section code input
            - Bulk subscribe button
            - Matched section cards with course, code, semester, campus, teachers
            - Unmatched codes
  ical:
    name: Personal Calendar Subscription iCal
    access:
      anon: Can copy a single-section iCal link from the public section detail page.
      user: Can copy their own personal subscription iCal link.
      admin: No additional exclusive iCal capabilities.
      agent: After authorization, can read the current user's personal calendar subscription information; REST and MCP should both return the same subscription feed information and description.
    rules:
      copyable-links: iCal links should be presented as copyable links rather than requiring users to manually construct them.
      no-second-model: iCal is an export / subscription capability and should not carry a second business model.
      static-json-resilient: Calendar location and building image enhancements only read static JSON published at https://static.life-ustc.tiankaima.dev; when loading fails or data is corrupted, diagnostic information should be logged and a valid iCal should still be returned.
    capabilities:
      section-calendar-dialog:
        title: Section Calendar Dialog
        auth: anon
        links:
          ui:
            - Calendar Export Dialog
        web:
          pages:
            - /sections/[jwId]
        rest:
          routes:
            - path: /api/sections/[jwId]/calendar.ics
              returns: text/calendar
              notes:
                - Returns text/calendar synthesized from the section's schedule and exams.
        display:
          fields:
            - iCalendar URL (copyable)
            - section.code (context)
            - "Export format: .ics"
            - Copy button
      personal-calendar-subscription:
        title: Personal Calendar Subscription
        auth: user
        links:
          models:
            - User
            - Section
          ui:
            - Calendar Export Dialog
        web:
          pages:
            - /?tab=calendar
        rest:
          routes:
            - path: /api/users/[userId]/calendar.ics
              returns: text/calendar
            - path: /api/calendar-subscriptions/current
              returns: "{ subscription: CalendarSubscription | null }"
              notes:
                - Returns subscribed section details, personal calendar feed path, full feed URL, and descriptive text.
        mcp:
          tools:
            - name: get_my_calendar_subscription
              returns: "{ success: Boolean, subscription?, message?: String }"
              rest_equivalent: GET /api/calendar-subscriptions/current
              notes:
                - Default mode returns feed links plus current-semester section context instead of the full subscribed section list.
                - Summary mode further reduces this to counts and feed-link metadata.
                - In summary/default MCP output, token-bearing calendarPath and calendarUrl may be redacted for privacy; request full mode only when the raw feed location is explicitly needed.
        display:
          fields:
            - iCalendar URL copy button
      multi-section-ical:
        title: Multi-Section iCal Export
        auth: anon
        web: unavailable
        rest:
          routes:
            - path: /api/sections/calendar.ics
              returns: text/calendar
              notes:
                - Generates a multi-section iCal based on sectionIds query parameter.
  subscribed-sections:
    name: Subscribed Sections
    access:
      anon: Cannot view their own subscribed sections list.
      user: Can only view and manage their own subscribed sections list.
      admin: Does not view or edit other users' subscription lists through ordinary pages.
      agent: Can read and manage the subscribed sections list data with the same semantics as the web through REST and MCP.
    rules:
      grouped-by-semester: The list is grouped by semester rather than presented as a single flat list.
      section-codes-promoted: In the 'subscribed context', users manage specific section relationships, so section codes are intentionally promoted.
    capabilities:
      subscribed-sections-tab:
        title: Subscribed Sections Tab
        auth: user
        links:
          models:
            - User
            - Section
          ui:
            - List Table
        web:
          pages:
            - /?tab=subscriptions
        rest:
          routes:
            - path: /api/calendar-subscriptions/current
              returns: "{ subscription: CalendarSubscription | null }"
              notes:
                - Returns the current user's subscribed section details and personal subscription feed information; supports the subscribed sections list and personal calendar subscription entry.
        mcp:
          tools:
            - name: list_my_subscribed_sections
              returns: "{ success: Boolean, sections: Section[], note: String }"
              rest_equivalent: GET /api/calendar-subscriptions/current
            - name: get_my_calendar_subscription
              returns: "{ success: Boolean, subscription?, message?: String }"
              rest_equivalent: GET /api/calendar-subscriptions/current
              notes:
                - Supplements calendarPath and calendarUrl on the same abstract entry.
                - Use full mode only when the caller explicitly needs the full subscribed section list on the same response.
        display:
          fields:
            - semester group label and count
            - subscription.sections[].code
            - subscription.sections[].course.namePrimary
            - section.teachers[]
            - section.credits
            - Unsubscribe button per section
  schedule:
    name: Schedule
    access:
      anon: Can read public schedule information.
      user: Can read public schedule information. Cannot modify schedule fact data.
      admin: Can read public schedule information. Does not directly modify schedule facts through ordinary pages.
      agent: Can read schedules for specific sections; current-user schedule aggregation is primarily exposed via MCP; public schedule retrieval is available through REST and MCP.
    rules:
      schedule-definition: Schedule refers to a section's class times, locations, and week patterns.
      schedule-as-context: The schedule within a section detail page is not treated as an isolated table but as an important entry point for understanding the section context.
      personal-calendar-integrates: The personal calendar integrates subscribed section schedules, homework due dates, exam times, and personal todo due dates.
    capabilities:
      my-schedule:
        title: My Schedule
        auth: user
        links:
          models:
            - Schedule
        web:
          pages:
            - /?tab=calendar
        rest: unavailable
        mcp:
          tools:
            - name: list_my_schedules
              returns: "{ schedules: ScheduleEntry[] }"
              notes:
                - Returns schedules[]; each item contains date, weekday, startTime, endTime, section.course.namePrimary, section.code, room, teachers[], and scheduleGroup.
        display:
          fields:
            - 7-day grid (Sun-Sat)
            - Today highlight
            - schedule.date
            - schedule.startTime - endTime
            - schedule.room.namePrimary
            - section.course.namePrimary
            - teacher names
          filters:
            - Previous/next semester links
      public-schedule-query:
        title: Public Schedule Query
        auth: anon
        links:
          models:
            - Schedule
        web: unavailable
        rest:
          routes:
            - path: /api/schedules
              returns: PaginatedResponse<ScheduleEntry>
              notes:
                - Supports filtering by section, teacher, room, date range, and day of week.
                - REST/MCP both accept exact JW/code-style filters for schedules so callers do not need to resolve internal numeric IDs first.
        mcp:
          tools:
            - name: query_schedules
              returns: PaginatedResponse<ScheduleEntry>
              rest_equivalent: GET /api/schedules
        display:
          filters:
            - sectionId
            - sectionJwId
            - sectionCode
            - teacherId
            - teacherCode
            - roomId
            - roomJwId
            - dateFrom/dateTo
            - weekday
      section-schedule:
        title: Section Schedule
        auth: anon
        links:
          models:
            - Schedule
        web:
          pages:
            - /sections/[jwId]
        rest:
          routes:
            - path: /api/sections/[jwId]/schedules
              returns: ScheduleEntry[]
              notes:
                - Returns a simplified variant of ScheduleEntry[] for the section.
            - path: /api/sections/[jwId]/schedule-groups
              returns: ScheduleGroupEntry[] (with schedules)
              notes:
                - Returns schedule groups with schedules, not separate aggregated period summaries.
        mcp:
          tools:
            - name: list_schedules_by_section
              returns: "{ found: Boolean, section: Section?, schedules: ScheduleEntry[] }"
              rest_equivalent: GET /api/sections/[jwId]/schedules
              notes:
                - Default/summary responses omit the repeated per-item section payload because the top-level section already scopes the list.
                - Accepts optional dateFrom/dateTo to narrow results to a specific window (e.g. the current week); both accept flexible date strings.
            - name: get_my_7days_timeline
              auth: user
              returns: "{ range: { from: DateTime, to: DateTime }, total: Int, events: CalendarEvent[] }"
              notes:
                - Returns schedules as the schedule type within a unified event stream.
                - Summary mode returns grouped counts/day slices plus a limited event sample instead of another full raw event dump.
                - Accepts optional atTime to anchor the 7-day window to a specific moment instead of the server clock; useful for asking about a future week.
        display:
          fields:
            - schedule.date
            - schedule.startTime - endTime
            - schedule.room (with building/campus)
            - schedule.weekday (0=Sunday)
            - schedule.teachers[] names
  calendar:
    name: Calendar
    access:
      anon: Can browse calendar information on public section detail pages.
      user: Can browse the personal calendar view.
      admin: Has no special calendar view separate from regular users.
      agent: Can read timeline information with the same semantics through OAuth REST and MCP.
    rules:
      views: Currently provides semester, month, and week views simultaneously.
      week-starts-sunday: The week view starts on Sunday.
      event-card-types: Calendar event cards uniformly carry course, exam, homework, and todo events.
    capabilities:
      personal-calendar-view:
        title: Personal Calendar View
        auth: user
        links:
          models:
            - Schedule
            - Homework
            - Exam
            - Todo
        web:
          pages:
            - /?tab=calendar
        rest: unavailable
        mcp:
          tools:
            - name: list_my_calendar_events
              returns: "{ events: CalendarEvent[] }"
              notes:
                - Returns course, exam, homework, and todo events unified by date range, directly corresponding to the personal calendar view.
                - Each item in events[] has type, at, and payload; payload corresponds to ScheduleEntry, HomeworkItem, ExamEntry, or TodoItem based on type.
                - Summary mode returns grouped counts/day slices plus a limited event sample instead of the full raw event list.
            - name: get_my_7days_timeline
              returns: "{ range: { from: DateTime, to: DateTime }, total: Int, events: CalendarEvent[] }"
            - name: list_my_schedules
              returns: "{ schedules: ScheduleEntry[] }"
            - name: list_my_exams
              returns: "{ exams: ExamEntry[] }"
        display:
          fields:
            - calendarEvents (schedules + exams + homeworks + todos)
            - schedule.date, startTime, endTime
            - exam.examDate, startTime, endTime, examMode, examRooms
            - homework.submissionDueAt
            - todo.dueAt
            - Week numbers
            - Weekday labels (Sun-Sat)
          filters:
            - View tabs
            - Previous/next semester controls
      section-calendar-view:
        title: Section Calendar View
        auth: anon
        links:
          ui:
            - Context Tabs
        web:
          pages:
            - /sections/[jwId]
        rest: stable
        display:
          fields:
            - calendarMonthStart (Month view)
            - calendarEvents[]
            - schedule.date, startTime, endTime
            - schedule.room (with building/campus)
            - schedule.teachers[].namePrimary
            - exam.examDate, startTime, endTime
            - exam.examRooms[]
            - weekLabelTemplate (Week numbers)
            - weekdayLabels (Sun-Sat)
            - todayKey (Today highlight)
      event-card:
        title: Event Card
        auth: anon
        web: stable
        rest: unavailable
        mcp: unavailable
        display:
          fields:
            - Event type (schedule/exam/homework/todo)
            - event.title or section.course.namePrimary
            - event.time or first metadata segment
            - Details/popover may show location
  homework:
    name: Homework
    access:
      anon: Can read homework information under public sections, but cannot create, update, or delete.
      user: When signed in and not suspended, can create and update homework; delete permission is limited to the creator and admins; each user can only manage their own homework completion state.
      admin: Can delete homework and participate in governance.
      agent: After authorization, can read, create, and update homework and set the current user's completion state; both REST and MCP currently provide this capability.
    rules:
      attached-to-section: Homework is attached to a section, not a personal user todo.
      no-subscription-required: Creating homework does not require the user to be subscribed to the section first.
      entity-and-completion-separated: Homework entity and homework completion state are strictly separated to prevent 'I completed it' from becoming 'the homework was modified'.
    capabilities:
      cross-section-homework-summary:
        title: Cross-Section Homework Summary
        auth: user
        links:
          models:
            - Homework
        web:
          pages:
            - /?tab=homeworks
        rest:
          routes:
            - path: /api/me/subscriptions/homeworks
              returns: "{ viewer, homeworks: HomeworkItem[], auditLogs: AuditLog[], sectionIds: Int[] }"
              notes:
                - Returns homeworks across all subscribed sections in a single call; includes audit logs and viewer context.
        mcp:
          tools:
            - name: list_my_homeworks
              returns: "{ homeworks: HomeworkItem[] }"
              notes:
                - Returns homeworks[]; each item contains title, submissionDueAt, section.course.namePrimary, section.code, description, and completion.
        display:
          fields:
            - homework.title
            - homework.description.content
            - homework.submissionDueAt (with ETA label)
            - section.course.namePrimary
            - homework.isMajor badge
            - homework.requiresTeam badge
            - completionStatus (completed/pending)
            - "filter: incomplete/completed/all"
      section-homework-tab:
        title: Section Homework Tab
        auth: anon
        links:
          models:
            - Homework
          ui:
            - Context Tabs
        web:
          pages:
            - /sections/[jwId]
        rest:
          routes:
            - path: /api/homeworks
              returns: "{ viewer: String, homeworks: HomeworkItem[], auditLogs: AuditLog[] }"
            - path: /api/homeworks
              method: POST
              returns: "{ id: String }"
              auth: user
            - path: /api/homeworks/[id]
              method: PATCH
              returns: "{ success: Boolean }"
              auth: user
            - path: /api/homeworks/[id]
              method: DELETE
              returns: "{ success: Boolean }"
              auth: user
        mcp:
          tools:
            - name: list_homeworks_by_section
              returns: "{ found: Boolean, section: Section?, homeworks: HomeworkItem[] }"
              rest_equivalent: GET /api/homeworks
              notes:
                - Default/summary responses omit the repeated per-item section payload because the top-level section already scopes the list.
                - Editor identity fields stay in full mode; default/summary focus on homework state and due context.
            - name: create_homework_on_section
              auth: user
              returns: "{ success: Boolean, id: String, homework: HomeworkItem }"
              rest_equivalent: POST /api/homeworks
              notes:
                - Returns the created homework snapshot so MCP clients can continue with follow-up actions without an extra read.
            - name: update_homework_on_section
              auth: user
              returns: "{ success: Boolean, homework: HomeworkItem }"
              rest_equivalent: PATCH /api/homeworks/[id]
              notes:
                - Returns the updated homework snapshot after metadata and/or description changes are applied.
        display:
          fields:
            - homework.title
            - homework.description.content
            - homework.submissionDueAt
            - homework.createdAt
            - homework.submissionStartAt
            - homework.publishedAt
            - commentCount / comments action
            - user completion status
            - edit action
      homework-governance:
        title: Homework Governance
        auth: admin
        web: unavailable
        rest:
          routes:
            - path: /api/admin/homeworks
              returns: "{ homeworks: HomeworkItem[] }"
            - path: /api/admin/homeworks/[id]
              method: DELETE
              returns: "{ success: Boolean }"
        mcp: unavailable
        display:
          fields:
            - homework.title
            - homework.section.code
            - creator
            - creation timestamp
            - "Action: delete"
            - "Status: active/deleted"
      homework-completion:
        title: Homework Completion
        auth: user
        links:
          models:
            - Homework
        web: stable
        rest:
          routes:
            - path: /api/homeworks/[id]/completion
              method: PUT
              returns: "{ completed: Boolean, completedAt: DateTime? }"
        mcp:
          tools:
            - name: set_my_homework_completion
              returns: "{ success: Boolean, completion: { homeworkId: String, completed: Boolean, completedAt: DateTime? } }"
              rest_equivalent: PUT /api/homeworks/[id]/completion
              notes:
                - Pass completed=true to mark as done, completed=false to revert to incomplete.
            - name: unset_my_homework_completion
              returns: "{ success: Boolean, completion: { homeworkId: String, completed: Boolean, completedAt: DateTime? } }"
              rest_equivalent: PUT /api/homeworks/[id]/completion
              notes:
                - Dedicated tool to revert a completed homework back to incomplete; equivalent to set_my_homework_completion with completed=false.
        display:
          fields:
            - homework.title
            - homework.submissionDueAt
            - completion action button
            - completion status
  todo:
    name: Todo
    access:
      anon: Cannot read or write personal todos.
      user: Can only manage their own todos.
      admin: Has no ordinary page capability to independently manage other users' todos.
      agent: After authorization, can only read and write the current user's own todos; both REST and MCP currently provide this capability.
    rules:
      purely-personal: Todo is a purely personal object and is not bound to any section.
      due-date-calendar: Only incomplete todos with a due date appear in the calendar.
      completed-retained: Completed todos retain history but no longer occupy urgent information areas.
    capabilities:
      todo-list:
        title: Todo List & Filter
        auth: user
        links:
          models:
            - Todo
        web:
          pages:
            - /?tab=todos
        rest:
          routes:
            - path: /api/todos
              returns: "{ todos: TodoItem[] }"
              notes:
                - Returns todos[]; each item contains id, title, content, completed, priority, dueAt, createdAt, and updatedAt.
        mcp:
          tools:
            - name: list_my_todos
              returns: "{ counts: { incomplete: Int, completed: Int, overdue: Int }, todos: TodoItem[] }"
              rest_equivalent: GET /api/todos
              notes:
                - "Default parameters: includeCompleted=false, limit=50."
                - Incomplete items are returned first; completed items are excluded unless includeCompleted=true.
        display:
          fields:
            - todo.title
            - todo.content (description)
            - todo.priority
            - todo.dueAt
            - completed status action button
