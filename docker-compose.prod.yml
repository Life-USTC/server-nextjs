services:
  app:
    container_name: life-ustc-nextjs
    image: ${APP_IMAGE:?Set APP_IMAGE to an explicit ghcr.io/life-ustc/server-nextjs:<release-tag> or @sha256:<digest>; latest is alias-only}
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      APP_PUBLIC_ORIGIN: ${APP_PUBLIC_ORIGIN:?Set APP_PUBLIC_ORIGIN to the public https:// origin served by this deployment}
      APP_CANONICAL_ORIGIN: ${APP_CANONICAL_ORIGIN:-}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      AUTH_SECRET: ${AUTH_SECRET}
      S3_BUCKET: ${S3_BUCKET}
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
