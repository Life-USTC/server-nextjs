services:
  app:
    container_name: life-ustc-nextjs
    image: ghcr.io/life-ustc/server-nextjs:latest
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-https://life-ustc.tiankaima.dev}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      AUTH_SECRET: ${AUTH_SECRET}
      S3_BUCKET: ${S3_BUCKET}
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
