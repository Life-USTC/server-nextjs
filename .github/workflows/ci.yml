name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    env:
      DATABASE_URL: postgresql://user:password@127.0.0.1:5432/dummy
      JWT_SECRET: ci-check-secret-0123456789abcdef0123456789abcdef
      AUTH_SECRET: ci-check-secret-0123456789abcdef0123456789abcdef

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Biome check (no write)
        id: biome
        continue-on-error: true
        run: bun run check 2>&1

      - name: Apply Biome fixes
        if: steps.biome.outcome == 'failure'
        run: bun run check --write

      - name: Auto-commit Biome fixes
        if: >
          steps.biome.outcome == 'failure' &&
          (github.event_name == 'push' ||
            (github.event_name == 'pull_request' &&
              github.event.pull_request.head.repo.full_name == github.repository))
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: apply biome fixes"
          file_pattern: "."

      - name: Verify Biome check
        run: bun run check 2>&1

      - name: Generate types (Prisma & OpenAPI)
        run: bun run prebuild

      - name: Typecheck
        run: bun run typecheck

      - name: Run i18n key check
        run: bun run check:i18n

      - name: Run unit tests
        run: bun run test

  test-e2e:
    name: E2E Test (${{ matrix.scope }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - scope: api-mcp
            workers: 4
            paths: tests/e2e/src/app/api
          - scope: public-web
            workers: 4
            paths: tests/e2e/src/app/api-docs tests/e2e/src/app/bus tests/e2e/src/app/bus-map tests/e2e/src/app/courses tests/e2e/src/app/guides tests/e2e/src/app/mobile-app tests/e2e/src/app/privacy tests/e2e/src/app/terms tests/e2e/src/app/u
          - scope: signed-in-web
            workers: 2
            paths: tests/e2e/src/app/test.ts tests/e2e/src/app/dashboard tests/e2e/src/app/oauth tests/e2e/src/app/sections tests/e2e/src/app/settings tests/e2e/src/app/signin tests/e2e/src/app/teachers tests/e2e/src/app/welcome
          - scope: admin-stateful
            workers: 1
            paths: tests/e2e/src/app/admin tests/e2e/src/app/comments
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/life_ustc_e2e
      JWT_SECRET: e2e-ci-secret
      WEBHOOK_SECRET: e2e-ci-secret
      S3_BUCKET: life-ustc-e2e
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL_S3: http://127.0.0.1:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AUTH_SECRET: e2e-ci-secret
      NO_PROXY: 127.0.0.1,localhost,::1
      PLAYWRIGHT_WORKERS: ${{ matrix.workers }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: life_ustc_e2e
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            -e MINIO_API_CORS_ALLOW_ORIGIN=http://127.0.0.1:3000 \
            minio/minio:latest \
            server /data --console-address ":9001"

          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null; then
              exit 0
            fi
            sleep 1
          done

          echo "MinIO failed to start" >&2
          docker logs minio >&2 || true
          exit 1

      - name: Provision E2E bucket
        run: |
          bun -e '
            import {
              CreateBucketCommand,
              HeadBucketCommand,
              PutObjectCommand,
              S3Client,
            } from "@aws-sdk/client-s3";
            import { getSignedUrl } from "@aws-sdk/s3-request-presigner";

            const bucket = process.env.S3_BUCKET;
            const endpoint = process.env.AWS_ENDPOINT_URL_S3;
            const region = process.env.AWS_REGION ?? "us-east-1";

            if (!bucket || !endpoint) {
              throw new Error("Missing MinIO bucket provisioning env");
            }

            const client = new S3Client({
              region,
              endpoint,
              forcePathStyle: true,
            });

            try {
              await client.send(new HeadBucketCommand({ Bucket: bucket }));
            } catch {
              await client.send(new CreateBucketCommand({ Bucket: bucket }));
            }

            const smokeKey = `ci-smoke/${Date.now()}.txt`;
            const url = await getSignedUrl(
              client,
              new PutObjectCommand({
                Bucket: bucket,
                Key: smokeKey,
                ContentType: "text/plain",
              }),
              { expiresIn: 60 },
            );
            const response = await fetch(url, {
              method: "PUT",
              headers: { "Content-Type": "text/plain" },
              body: "ok",
            });
            if (!response.ok) {
              throw new Error(
                `MinIO smoke upload failed with ${response.status}: ${await response.text()}`,
              );
            }
          '

      - name: Apply Prisma migrations
        run: bun run prisma:deploy

      - name: Run Biome check
        run: bun run check

      - name: Run E2E convention check
        run: bun run check:e2e

      - name: Setup Prisma and Zod
        run: bun run prebuild

      - name: Typecheck
        run: bun run typecheck

      - name: Run Playwright E2E tests
        run: bun run test:e2e -- ${{ matrix.paths }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ matrix.scope }}
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 14
