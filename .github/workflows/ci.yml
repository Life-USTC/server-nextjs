name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Biome check (no write)
        id: biome
        continue-on-error: true
        run: bun run check 2>&1

      - name: Apply Biome fixes
        if: steps.biome.outcome == 'failure'
        run: bun run check --write

      - name: Auto-commit Biome fixes
        if: >
          steps.biome.outcome == 'failure' &&
          (github.event_name == 'push' ||
            (github.event_name == 'pull_request' &&
              github.event.pull_request.head.repo.full_name == github.repository))
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: apply biome fixes"
          file_pattern: "."

      - name: Verify Biome check
        run: bun run check 2>&1

      - name: Generate types (Prisma & OpenAPI)
        run: bun run prebuild
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/dummy

      - name: Typecheck
        run: bun run typecheck

      - name: Run unit tests
        run: bun run test

  test-e2e:
    name: E2E Test
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/life_ustc_e2e
      JWT_SECRET: e2e-ci-secret
      WEBHOOK_SECRET: e2e-ci-secret
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: life-ustc-e2e
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      R2_ACCESS_URL: http://minio:9000
      AUTH_SECRET: e2e-ci-secret

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: life_ustc_e2e
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Apply Prisma migrations
        run: bun run prisma:deploy

      - name: Run Biome check
        run: bun run check

      - name: Run E2E convention check
        run: bun run check:e2e

      - name: Setup Prisma and Zod
        run: bun run prebuild

      - name: Typecheck
        run: bun run typecheck

      - name: Run Playwright E2E tests
        run: bun run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
