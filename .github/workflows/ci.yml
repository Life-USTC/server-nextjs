name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Biome check (no write)
        id: biome
        continue-on-error: true
        run: bun run check 2>&1

      - name: Apply Biome fixes
        if: steps.biome.outcome == 'failure'
        run: bun run check --write

      - name: Auto-commit Biome fixes
        if: >
          steps.biome.outcome == 'failure' &&
          (github.event_name == 'push' ||
            (github.event_name == 'pull_request' &&
              github.event.pull_request.head.repo.full_name == github.repository))
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: apply biome fixes"
          file_pattern: "."

      - name: Verify Biome check
        run: bun run check 2>&1

      - name: Generate types (Prisma & OpenAPI)
        run: bun run prebuild
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/dummy

      - name: Typecheck
        run: bun run typecheck

      - name: Run i18n key check
        run: bun run check:i18n

      - name: Run unit tests
        run: bun run test

  test-e2e:
    name: E2E Test (${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2]
        shardTotal: [2]
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/life_ustc_e2e
      JWT_SECRET: e2e-ci-secret
      WEBHOOK_SECRET: e2e-ci-secret
      S3_BUCKET: life-ustc-e2e
      AWS_REGION: us-east-1
      AWS_ENDPOINT_URL_S3: http://127.0.0.1:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AUTH_SECRET: e2e-ci-secret

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: life_ustc_e2e
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:RELEASE.2026-03-13T11-33-38Z \
            server /data --console-address ":9001"

          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null; then
              exit 0
            fi
            sleep 1
          done

          echo "MinIO failed to start" >&2
          docker logs minio >&2 || true
          exit 1

      - name: Create E2E bucket
        run: |
          docker run --rm --network host minio/mc sh -c \
            "mc alias set local http://127.0.0.1:9000 minioadmin minioadmin && \
             mc mb --ignore-existing local/life-ustc-e2e"

      - name: Apply Prisma migrations
        run: bun run prisma:deploy

      - name: Run Biome check
        run: bun run check

      - name: Run E2E convention check
        run: bun run check:e2e

      - name: Setup Prisma and Zod
        run: bun run prebuild

      - name: Typecheck
        run: bun run typecheck

      - name: Run Playwright E2E tests
        run: bun run test:e2e -- --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ matrix.shardIndex }}-of-${{ matrix.shardTotal }}
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 14
