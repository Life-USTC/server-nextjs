name: E2E Snapshot Artifacts

on:
  push:
    branches-ignore:
      - e2e-snapshot-artifacts
  workflow_dispatch:

jobs:
  collect-commits:
    name: Collect commits
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      shas: ${{ steps.commits.outputs.shas }}
    steps:
      - name: Collect commit SHAs
        id: commits
        shell: bash
        run: |
          # Always snapshot the workflow commit only. Replaying every commit from a
          # multi-commit push breaks when intermediate commits have stale tooling
          # paths or transient build failures that the head commit has already fixed.
          shas="$(jq -c --arg sha "$GITHUB_SHA" '[$sha]' <<< '{}')"
          echo "shas=$shas" >> "$GITHUB_OUTPUT"

  comment-artifacts:
    name: Comment E2E artifacts (${{ matrix.sha }})
    needs: collect-commits
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        sha: ${{ fromJson(needs.collect-commits.outputs.shas) }}
    concurrency:
      group: e2e-snapshot-artifacts-publisher
      cancel-in-progress: false
    permissions:
      contents: write
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: life_ustc_e2e_snapshots
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/life_ustc_e2e_snapshots
      JWT_SECRET: e2e-snapshot-ci-secret
      WEBHOOK_SECRET: e2e-snapshot-ci-secret
      AUTH_SECRET: e2e-snapshot-ci-secret
      NO_PROXY: 127.0.0.1,localhost,::1

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ matrix.sha }}
          fetch-depth: 0

      - name: Setup workspace
        uses: ./.github/actions/setup-bun-env
        with:
          install-playwright: "true"

      - name: Generate Prisma client
        shell: bash
        run: |
          bun run svelte-kit sync
          bun run prisma generate

      - name: Build standalone app
        shell: bash
        run: bun run test:e2e:artifacts

      - name: Bootstrap E2E services
        shell: bash
        run: |
          docker rm -f life-ustc-minio-dev >/dev/null 2>&1 || true
          docker run -d \
            --name life-ustc-minio-dev \
            -p 9000:9000 \
            -p 9001:9001 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            -e MINIO_API_CORS_ALLOW_ORIGIN=http://127.0.0.1:3000,http://localhost:3000 \
            minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1 \
            server /data --console-address ":9001"
          for _ in $(seq 1 30); do
            curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null && break
            sleep 1
          done
          curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null
          bun run prisma migrate deploy
          bun run verify:e2e

      - name: Seed E2E scenarios
        shell: bash
        run: bun run dev:seed-scenarios

      - name: Capture E2E snapshots
        id: snapshots
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p test-results/snapshots
          node build/index.js > test-results/e2e-snapshot-server.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true; wait "$server_pid" 2>/dev/null || true' EXIT

          for _ in $(seq 1 90); do
            if bun run health; then
              break
            fi
            if ! kill -0 "$server_pid" 2>/dev/null; then
              cat test-results/e2e-snapshot-server.log
              exit 1
            fi
            sleep 2
          done

          if ! bun run health; then
            cat test-results/e2e-snapshot-server.log
            exit 1
          fi

          bun run snapshot

      - name: Upload E2E snapshot artifact
        id: upload
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: e2e-snapshot-artifacts-${{ matrix.sha }}
          path: |
            test-results/snapshots
            test-results/e2e-snapshot-server.log
          if-no-files-found: error
          retention-days: 14

      - name: Publish screenshot previews
        id: previews
        if: ${{ always() }}
        shell: bash
        run: |
          preview_branch="e2e-snapshot-artifacts"
          preview_root="$(mktemp -d)"
          git fetch origin "$preview_branch" || true

          if git rev-parse --verify "origin/$preview_branch" >/dev/null 2>&1; then
            git worktree add "$preview_root" "origin/$preview_branch"
          else
            git worktree add --detach "$preview_root"
            git -C "$preview_root" switch --orphan "$preview_branch"
            git -C "$preview_root" rm -rf . >/dev/null 2>&1 || true
          fi

          rm -rf "$preview_root/${{ matrix.sha }}"
          mkdir -p "$preview_root/${{ matrix.sha }}"

          if [ -d test-results/snapshots/pages ]; then
            find test-results/snapshots/pages -name screenshot.png -print0 |
              while IFS= read -r -d '' screenshot; do
                relative_path="${screenshot#test-results/snapshots/}"
                mkdir -p "$preview_root/${{ matrix.sha }}/$(dirname "$relative_path")"
                cp "$screenshot" "$preview_root/${{ matrix.sha }}/$relative_path"
              done
          fi

          git -C "$preview_root" config user.name "github-actions[bot]"
          git -C "$preview_root" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$preview_root" add "${{ matrix.sha }}"

          if ! git -C "$preview_root" diff --cached --quiet; then
            git -C "$preview_root" commit -m "chore: publish e2e screenshots for ${{ matrix.sha }}"
            git -C "$preview_root" push origin "HEAD:$preview_branch"
          fi

          echo "base-url=https://raw.githubusercontent.com/${{ github.repository }}/$preview_branch/${{ matrix.sha }}" >> "$GITHUB_OUTPUT"

      - name: Render commit comment
        if: ${{ always() }}
        shell: bash
        run: |
          artifact_url="${{ steps.upload.outputs.artifact-url }}"
          workflow_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ -z "$artifact_url" ]; then
            artifact_url="$workflow_url"
          fi

          bun run tools/dev/artifacts/snapshots/snapshot-report.ts render-comment \
            --snapshot-dir test-results/snapshots \
            --artifact-url "$artifact_url" \
            --commit "${{ matrix.sha }}" \
            --status "${{ steps.snapshots.outcome }}" \
            --screenshot-base-url "${{ steps.previews.outputs.base-url }}" \
            --workflow-url "$workflow_url" \
            --output test-results/e2e-snapshot-comment.md

      - name: Comment on commit
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if [ ! -s test-results/e2e-snapshot-comment.md ]; then
            echo "No E2E snapshot comment was generated."
            exit 0
          fi

          jq -n --rawfile body test-results/e2e-snapshot-comment.md \
            '{body: $body}' > test-results/e2e-snapshot-comment.json
          gh api \
            --method POST \
            "repos/${{ github.repository }}/commits/${{ matrix.sha }}/comments" \
            --input test-results/e2e-snapshot-comment.json

      - name: Fail when snapshot capture failed
        if: ${{ steps.snapshots.outcome != 'success' }}
        shell: bash
        run: exit 1
