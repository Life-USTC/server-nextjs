services:
  postgres:
    image: postgres:16
    container_name: life-ustc-postgres-dev
    environment:
      POSTGRES_DB: life_ustc_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data-dev:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: life-ustc-minio-dev
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_API_CORS_ALLOW_ORIGIN: "http://127.0.0.1:3000,http://localhost:3000"
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - minio-data-dev:/data

  minio-setup:
    image: minio/mc:latest
    container_name: life-ustc-minio-setup-dev
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c '
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/life-ustc-dev
      '

  app:
    image: oven/bun:1.3.13
    container_name: life-ustc-nextjs-dev
    profiles: ["app"]
    working_dir: /usr/src/app
    env_file:
      - .env
    command: >
      sh -lc "
      mkdir -p /home/bun/.bun/install/cache /usr/src/app/.next /usr/src/app/node_modules &&
      chown -R bun:bun /home/bun/.bun /usr/src/app/.next /usr/src/app/node_modules /usr/src/app/src/generated/prisma &&
      su -m bun -s /bin/sh -c 'cd /usr/src/app && bun install --frozen-lockfile && bun run dev --hostname 0.0.0.0 --port 3000'
      "
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/life_ustc_dev
      APP_PUBLIC_ORIGIN: http://127.0.0.1:3000
      BETTER_AUTH_URL: http://127.0.0.1:3000
      S3_BUCKET: life-ustc-dev
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_ENDPOINT_URL_S3: http://minio:9000
      CHOKIDAR_USEPOLLING: "1"
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cd /tmp && bun -e \"fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s
    volumes:
      - ./:/usr/src/app:Z
      - bun-cache:/home/bun/.bun/install/cache
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully

volumes:
  postgres-data-dev:
  minio-data-dev:
  bun-cache:
