services:
  postgres:
    image: postgres:16
    container_name: life-ustc-postgres-dev
    environment:
      POSTGRES_DB: life_ustc_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data-dev:/var/lib/postgresql/data

  app:
    image: oven/bun:1
    container_name: life-ustc-nextjs-dev
    working_dir: /usr/src/app
    command: sh -lc "bun install --frozen-lockfile && bun run dev --hostname 0.0.0.0 --port 3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/life_ustc_dev
      JWT_SECRET: dev-jwt-secret
      WEBHOOK_SECRET: dev-webhook-secret
      AUTH_SECRET: dev-auth-secret
      CHOKIDAR_USEPOLLING: "1"
    ports:
      - "3000:3000"
    volumes:
      - ./:/usr/src/app
      - bun-cache:/root/.bun
      - node-modules:/usr/src/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data-dev:
  bun-cache:
  node-modules:
